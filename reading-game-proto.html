<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เขียนคำอ่าน — ต้นแบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sarabun', sans-serif;
  background: #fdf8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
}

h1 {
  font-size: 18px;
  color: #8b6310;
  font-family: 'Noto Sans TC', sans-serif;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.subtitle {
  font-size: 13px;
  color: #b08040;
  margin-bottom: 20px;
}

/* ── Progress ── */
.progress-bar-wrap {
  width: 100%; max-width: 460px;
  height: 6px; background: #ede0c8;
  border-radius: 3px; margin-bottom: 20px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #e8a020, #d85a30);
  border-radius: 3px; transition: width 0.4s ease;
}

/* ── Card ── */
.card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  width: 100%; max-width: 460px;
  padding: 24px 24px 22px;
  display: flex; flex-direction: column;
  align-items: center; gap: 18px;
}

/* ── Top bar ── */
.top-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  width: 100%;
}
.score-bar { display: flex; gap: 14px; font-size: 13px; color: #a08050; font-family: 'Noto Sans TC', sans-serif; }
.score-bar span { font-weight: 700; color: #5a3e10; }
.streak-badge {
  display: none; align-items: center; gap: 4px;
  background: #fff3e0; border: 1.5px solid #ffcc02;
  border-radius: 999px; padding: 3px 10px;
  font-size: 13px; font-weight: 700; color: #e65100;
}
.streak-badge.show { display: flex; }

/* ── Word ── */
.word-area { text-align: center; }
.word-th {
  font-size: 52px; font-weight: 700;
  color: #3a2a0a; line-height: 1.2;
}
.word-zh { font-size: 15px; color: #888; font-family: 'Noto Sans TC', sans-serif; margin-top: 4px; }

/* ── Hint button (before answer) ── */
.hint-btn-wrap { width: 100%; display: flex; justify-content: center; }
.btn-hint {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 18px; border-radius: 999px;
  border: 1.5px solid #d4b87a; background: #fdf5e6;
  color: #8b6310; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'Sarabun', sans-serif;
  transition: background 0.15s, border-color 0.15s;
}
.btn-hint:hover { background: #ffeedd; border-color: #c07030; }
.btn-hint.used { opacity: 0.45; pointer-events: none; }
.btn-hint.used::after { content: ' (ใช้แล้ว)'; font-size: 11px; color: #c07030; }

/* ── Note box ── */
.note-area {
  font-size: 13px; color: #7a5030;
  background: #fdf5e6; border-radius: 10px;
  padding: 10px 14px; width: 100%; line-height: 1.7;
  border-left: 3px solid #d4a060;
  display: none;
}
.note-area.show { display: block; }
.note-area .note-label {
  font-size: 11px; font-weight: 700; color: #c07030;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 3px;
}

/* ── Re-queue notice ── */
.requeue-notice {
  font-size: 12px; color: #888;
  background: #f5f0ea; border-radius: 8px;
  padding: 6px 12px; display: none;
}
.requeue-notice.show { display: block; }

/* ── Slots ── */
.slots-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.slot-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.slot {
  min-width: 72px; height: 56px;
  border-radius: 12px; border: 2.5px dashed #d4b87a;
  background: #fdf5e6;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #5a3e10;
  cursor: pointer; padding: 0 12px;
  transition: border-color 0.2s, background 0.2s, transform 0.1s;
  position: relative;
}
.slot:hover { border-color: #c07030; }
.slot.filled { border-style: solid; border-color: #c07030; background: #fff8ee; }
.slot.correct { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.slot.wrong   { border-color: #f44336; background: #fdecea; color: #c62828; }
.slot-num { position: absolute; top: 3px; left: 6px; font-size: 10px; color: #c0a070; font-weight: 400; }
.slot-hint { font-size: 12px; min-height: 16px; color: #e53935; font-weight: 600; }
.slot-hint.ok { color: #388e3c; }

/* ── Chips ── */
.chips-area { width: 100%; }
.chips-label { font-size: 12px; color: #a08050; margin-bottom: 8px; text-align: center; }
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip {
  padding: 8px 18px; border-radius: 999px;
  border: 2px solid #d4b87a; background: #fff;
  color: #5a3e10; font-size: 18px; font-weight: 600;
  font-family: 'Sarabun', sans-serif;
  cursor: pointer; user-select: none;
  transition: background 0.15s, transform 0.1s, border-color 0.15s, opacity 0.2s;
}
.chip:hover:not(.used) { background: #ffeedd; border-color: #c07030; transform: scale(1.06); }
.chip.used { opacity: 0.22; pointer-events: none; }
.chip.correct-chip { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.chip.wrong-chip   { border-color: #f44336; background: #fdecea; color: #c62828; }

/* ── Result banner ── */
.result-banner {
  width: 100%; padding: 11px 16px; border-radius: 12px;
  text-align: center; font-size: 15px; font-weight: 600; display: none;
}
.result-banner.show { display: block; }
.result-banner.perfect  { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.result-banner.partial  { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
.result-banner.fail     { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; }

/* ── Reading reveal ── */
.reading-reveal { font-size: 13px; color: #999; text-align: center; display: none; }
.reading-reveal.show { display: block; }
.reading-full { font-size: 24px; font-weight: 700; color: #5a3e10; margin-top: 3px; }

/* ── Buttons ── */
.btn-row { display: flex; gap: 10px; justify-content: center; width: 100%; }
.btn {
  padding: 12px 26px; border-radius: 999px; border: none;
  font-size: 16px; font-weight: 700; cursor: pointer;
  font-family: 'Sarabun', sans-serif;
  transition: background 0.2s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, #e8a020, #d85a30); color: #fff; }
.btn-primary:hover { background: linear-gradient(135deg, #d49010, #c04a20); }
.btn-primary:disabled { opacity: 0.35; cursor: default; }
.btn-secondary { background: #f0e8d8; color: #8b6310; }
.btn-secondary:hover { background: #e8dcc8; }

/* ── End screen ── */
#end-screen {
  display: none; flex-direction: column;
  align-items: center; gap: 16px; text-align: center;
}
#end-screen h2 { font-size: 26px; color: #5a3e10; }
.big-score { font-size: 52px; font-weight: 700; color: #d85a30; }
.end-stats { display: flex; gap: 20px; justify-content: center; font-size: 14px; color: #888; }
.end-stats b { color: #5a3e10; font-size: 18px; display: block; }
</style>
</head>
<body>

<h1>เขียนคำอ่าน</h1>
<p class="subtitle">เลือก chip ใส่ช่องตามลำดับพยางค์</p>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
</div>

<!-- Game card -->
<div class="card" id="game-card">

  <!-- top bar -->
  <div class="top-bar">
    <div class="score-bar">
      <div>คำที่ <span id="q-num">1</span>/<span id="q-total">?</span></div>
      <div>✓ <span id="score-ok">0</span></div>
      <div>✗ <span id="score-bad">0</span></div>
    </div>
    <div class="streak-badge" id="streak-badge">🔥 <span id="streak-num">0</span></div>
  </div>

  <!-- word -->
  <div class="word-area">
    <div class="word-th" id="word-th">—</div>
    <div class="word-zh" id="word-zh"></div>
  </div>

  <!-- hint button (before answer) -->
  <div class="hint-btn-wrap">
    <button class="btn-hint" id="btn-hint" onclick="showHint()">
      💡 ดูคำอธิบาย
    </button>
  </div>

  <!-- note area (hint / post-check) -->
  <div class="note-area" id="note-area">
    <div class="note-label" id="note-label">💡 คำอธิบาย</div>
    <div id="note-text"></div>
  </div>

  <!-- re-queue notice -->
  <div class="requeue-notice" id="requeue-notice">🔁 คำนี้จะวนกลับมาให้ฝึกอีกครั้ง</div>

  <!-- slots -->
  <div class="slots-row" id="slots-row"></div>

  <!-- result banner -->
  <div class="result-banner" id="result-banner"></div>

  <!-- reading reveal -->
  <div class="reading-reveal" id="reading-reveal">
    คำอ่านที่ถูกต้อง
    <div class="reading-full" id="reading-full"></div>
  </div>

  <!-- chips -->
  <div class="chips-area">
    <div class="chips-label">เลือกพยางค์</div>
    <div class="chips-row" id="chips-row"></div>
  </div>

  <!-- buttons -->
  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-skip" onclick="skipWord()">ข้ามคำนี้</button>
    <button class="btn btn-primary"   id="btn-check" onclick="checkAnswer()" disabled>ตรวจ</button>
    <button class="btn btn-primary"   id="btn-next"  onclick="nextWord()" style="display:none">คำถัดไป →</button>
  </div>

</div>

<!-- End screen -->
<div class="card" id="end-screen">
  <div style="font-size:52px">🎉</div>
  <h2>เล่นครบแล้ว!</h2>
  <div class="big-score" id="end-score">—</div>
  <div class="end-stats">
    <div><b id="end-hint-count">0</b>ครั้งที่ดู hint</div>
    <div><b id="end-requeue">0</b>คำที่วนกลับมา</div>
    <div><b id="end-streak">0</b>streak สูงสุด</div>
  </div>
  <p id="end-msg" style="color:#888;font-size:14px;max-width:320px;line-height:1.6"></p>
  <button class="btn btn-primary" onclick="restartGame()">เล่นอีกครั้ง</button>
</div>

  { th:'ยาสีฟัน',     reading:'ยา-สี-ฟัน',              zh:'牙膏',          note:'3 พยางค์ ยา+สี+ฟัน แต่ละพยางค์อ่านตรงตัว' },
  { th:'ผ้าเช็ดตัว',  reading:'ผ้า-เช็ด-ตัว',           zh:'毛巾',          note:'เช็ด สระเ_็ด สั้น · ด ตัวสะกดแม่กด' },
  { th:'ทางม้าลาย',   reading:'ทาง-ม้า-ลาย',            zh:'斑馬線',        note:'ลาย ย ตัวสะกดแม่เกย · ม้า ห นำ ม → เสียงสูง' },
  { th:'เครื่องบิน',  reading:'เครื่อง-บิน',            zh:'飛機',          note:'เครื่อง สระเ_ื่อ+ง · คร พยัญชนะควบ' },
  { th:'กระเป๋าเงิน', reading:'กฺระ-เป๋า-เงิน',         zh:'錢包',          note:'กร → กฺระ สระอะสั้นกลืน · เป๋า วรรณยุกต์ตรี' },
  { th:'กุญแจ',       reading:'กุน-แจ',                 zh:'鑰匙',          note:'ญ ท้ายพยางค์ออกเสียง น · แจ สระแอ+ไม่มีตัวสะกด' },
  { th:'ผ้าห่ม',      reading:'ผ้า-ห่ม',                zh:'棉被',          note:'ห่ม ห นำ ม เสียงต่ำ · ม ตัวสะกดแม่กม' },
  { th:'โรงแรม',      reading:'โรง-แรม',                zh:'飯店',          note:'โรง สระโ_+ง · แรม สระแอ+ม' },
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
var queue = [];          // index ไป WORDS
var current = 0;
var scoreOk = 0;
var scoreBad = 0;
var streak = 0;
var maxStreak = 0;
var hintUsedThisWord = false;
var totalHintUsed = 0;
var totalRequeued = 0;
var checked = false;

var slots = [];
var chips = [];
var correctSyls = [];

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function initGame() {
  queue = shuffle(WORDS.map(function(_, i){ return i; }));
  current = 0; scoreOk = 0; scoreBad = 0; streak = 0; maxStreak = 0;
  totalHintUsed = 0; totalRequeued = 0;
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('game-card').style.display = 'flex';
  document.getElementById('q-total').textContent = WORDS.length;
  loadWord();
}

// ══════════════════════════════════════════════
// LOAD WORD
// ══════════════════════════════════════════════
function loadWord() {
  checked = false;
  hintUsedThisWord = false;

  var w = WORDS[queue[current]];
  correctSyls = w.reading.split('-');

  // progress (based on unique words done, capped at WORDS.length)
  var done = Math.min(current, WORDS.length);
  document.getElementById('progress-fill').style.width = (done / WORDS.length * 100) + '%';
  document.getElementById('q-num').textContent = Math.min(current + 1, WORDS.length);
  document.getElementById('score-ok').textContent = scoreOk;
  document.getElementById('score-bad').textContent = scoreBad;

  // streak badge
  var sb = document.getElementById('streak-badge');
  if (streak >= 2) { sb.classList.add('show'); document.getElementById('streak-num').textContent = streak; }
  else { sb.classList.remove('show'); }

  // word display
  var displayWord = w.th.replace(/-/g,'');
  document.getElementById('word-th').textContent = displayWord;
  document.getElementById('word-zh').textContent = w.zh;

  // reset UI
  document.getElementById('result-banner').className = 'result-banner';
  document.getElementById('reading-reveal').className = 'reading-reveal';
  document.getElementById('reading-full').textContent = '';
  document.getElementById('requeue-notice').className = 'requeue-notice';
  document.getElementById('note-area').className = 'note-area';
  document.getElementById('note-text').textContent = w.note || '';
  document.getElementById('note-label').textContent = '💡 คำอธิบาย';
  document.getElementById('btn-hint').className = 'btn-hint';
  document.getElementById('btn-hint').style.display = w.note ? '' : 'none';
  document.getElementById('btn-check').disabled = true;
  document.getElementById('btn-check').style.display = '';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-skip').style.display = '';

  buildSlots();
  buildChips(w);
}

// ══════════════════════════════════════════════
// HINT (before answer)
// ══════════════════════════════════════════════
function showHint() {
  if (hintUsedThisWord) return;
  hintUsedThisWord = true;
  totalHintUsed++;
  document.getElementById('btn-hint').classList.add('used');
  document.getElementById('note-label').textContent = '💡 คำอธิบาย (ดูก่อนตอบ — ไม่ได้ streak)';
  document.getElementById('note-area').classList.add('show');
}

// ══════════════════════════════════════════════
// BUILD SLOTS & CHIPS
// ══════════════════════════════════════════════
function buildSlots() {
  var row = document.getElementById('slots-row');
  row.innerHTML = '';
  slots = [];
  correctSyls.forEach(function(syl, i) {
    var wrap = document.createElement('div');
    wrap.className = 'slot-wrap';
    var el = document.createElement('div');
    el.className = 'slot';
    var num = document.createElement('span');
    num.className = 'slot-num';
    num.textContent = i + 1;
    el.appendChild(num);
    el.onclick = function(){ slotClick(i); };
    var hint = document.createElement('div');
    hint.className = 'slot-hint';
    wrap.appendChild(el);
    wrap.appendChild(hint);
    row.appendChild(wrap);
    slots.push({ el: el, val: null, hintEl: hint });
  });
}

function buildChips(w) {
  var row = document.getElementById('chips-row');
  row.innerHTML = '';
  chips = [];

  var pool = correctSyls.slice();
  var others = shuffle(WORDS.filter(function(_, i){ return i !== queue[current]; }));
  var added = 0;
  for (var wi = 0; wi < others.length && added < correctSyls.length * 2 + 3; wi++) {
    others[wi].reading.split('-').forEach(function(s) {
      if (pool.indexOf(s) === -1 && added < correctSyls.length * 2 + 3) {
        pool.push(s); added++;
      }
    });
  }

  var maxChips = Math.min(correctSyls.length + 5, 12);
  pool = shuffle(pool).slice(0, maxChips);
  correctSyls.forEach(function(s){ if (pool.indexOf(s) === -1) pool.push(s); });
  pool = shuffle(pool);

  pool.forEach(function(syl, i) {
    var el = document.createElement('div');
    el.className = 'chip';
    el.textContent = syl;
    el.onclick = function(){ chipClick(i); };
    row.appendChild(el);
    chips.push({ el: el, syl: syl, used: false });
  });
}

// ══════════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════════
function chipClick(ci) {
  if (checked) return;
  if (chips[ci].used) return;
  var target = -1;
  for (var i = 0; i < slots.length; i++) {
    if (slots[i].val === null) { target = i; break; }
  }
  if (target === -1) return;
  chips[ci].used = true;
  chips[ci].el.classList.add('used');
  slots[target].val = ci;
  var num = slots[target].el.querySelector('.slot-num');
  slots[target].el.innerHTML = '';
  slots[target].el.appendChild(num);
  slots[target].el.appendChild(document.createTextNode(chips[ci].syl));
  slots[target].el.classList.add('filled');
  document.getElementById('btn-check').disabled = slots.some(function(s){ return s.val === null; });
}

function slotClick(si) {
  if (checked) return;
  var slot = slots[si];
  if (slot.val === null) return;
  var ci = slot.val;
  chips[ci].used = false;
  chips[ci].el.classList.remove('used');
  slot.val = null;
  var num = slot.el.querySelector('.slot-num');
  slot.el.innerHTML = '';
  slot.el.appendChild(num);
  slot.el.classList.remove('filled');
  document.getElementById('btn-check').disabled = true;
}

// ══════════════════════════════════════════════
// CHECK
// ══════════════════════════════════════════════
function checkAnswer() {
  checked = true;
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = '';

  var correctCount = 0;
  slots.forEach(function(slot, i) {
    var userSyl = chips[slot.val].syl;
    var expected = correctSyls[i];
    if (userSyl === expected) {
      slot.el.classList.add('correct');
      slot.hintEl.textContent = '✓';
      slot.hintEl.className = 'slot-hint ok';
      chips[slot.val].el.classList.add('correct-chip');
      correctCount++;
    } else {
      slot.el.classList.add('wrong');
      slot.hintEl.textContent = '→ ' + expected;
      slot.hintEl.className = 'slot-hint';
      chips[slot.val].el.classList.add('wrong-chip');
    }
  });

  var allCorrect = correctCount === correctSyls.length;
  var banner = document.getElementById('result-banner');

  if (allCorrect) {
    if (!hintUsedThisWord) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
    }
    scoreOk++;
    var msgs = ['ถูกต้อง! 🎉', 'เก่งมาก! ✨', 'ยอดเยี่ยม! 🌟', 'เพอร์เฟกต์! 💯'];
    var extra = hintUsedThisWord ? ' (ดู hint — ไม่ได้ streak)' : (streak >= 3 ? ' 🔥' + streak + ' streak!' : '');
    banner.textContent = msgs[Math.floor(Math.random() * msgs.length)] + extra;
    banner.className = 'result-banner show perfect';
  } else {
    streak = 0;
    scoreBad++;
    var got = correctCount + '/' + correctSyls.length + ' พยางค์ถูก';
    if (correctCount === 0) {
      banner.textContent = 'ยังไม่ถูกเลย — ' + got;
      banner.className = 'result-banner show fail';
    } else {
      banner.textContent = 'เกือบแล้ว! — ' + got;
      banner.className = 'result-banner show partial';
    }
    // Re-queue: แทรกคำนี้กลับไปใน queue อีก 2-3 ตำแหน่ง
    requeueCurrentWord();
  }

  // คำอ่านเฉลย
  document.getElementById('reading-reveal').className = 'reading-reveal show';
  document.getElementById('reading-full').textContent = correctSyls.join(' · ');

  // note (แสดงเสมอหลังตรวจ)
  var w = WORDS[queue[current]];
  if (w.note) {
    var noteEl = document.getElementById('note-area');
    noteEl.classList.add('show');
    if (!hintUsedThisWord) {
      document.getElementById('note-label').textContent = '💡 ทำไมถึงอ่านแบบนี้?';
    }
  }

  // อัปเดต score bar + streak badge
  document.getElementById('score-ok').textContent = scoreOk;
  document.getElementById('score-bad').textContent = scoreBad;
  var sb = document.getElementById('streak-badge');
  if (streak >= 2) { sb.classList.add('show'); document.getElementById('streak-num').textContent = streak; }
  else { sb.classList.remove('show'); }
}

// ══════════════════════════════════════════════
// RE-QUEUE
// ══════════════════════════════════════════════
function requeueCurrentWord() {
  var wordIdx = queue[current];
  // แทรกกลับไปใน 2–4 ตำแหน่งข้างหน้า
  var insertAt = current + 1 + Math.floor(Math.random() * 3) + 1;
  insertAt = Math.min(insertAt, queue.length);
  queue.splice(insertAt, 0, wordIdx);
  totalRequeued++;
  document.getElementById('requeue-notice').classList.add('show');
}

// ══════════════════════════════════════════════
// SKIP
// ══════════════════════════════════════════════
function skipWord() {
  checked = true;
  streak = 0;
  scoreBad++;
  requeueCurrentWord();
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = '';
  slots.forEach(function(slot) {
    if (slot.val !== null) chips[slot.val].el.classList.add('wrong-chip');
    slot.el.classList.remove('filled');
  });
  document.getElementById('reading-reveal').className = 'reading-reveal show';
  document.getElementById('reading-full').textContent = correctSyls.join(' · ');
  var w = WORDS[queue[current]];
  if (w.note) {
    document.getElementById('note-label').textContent = '💡 คำอธิบาย';
    document.getElementById('note-area').classList.add('show');
  }
  var banner = document.getElementById('result-banner');
  banner.textContent = 'ข้ามแล้ว · คำอ่าน: ' + correctSyls.join('-');
  banner.className = 'result-banner show partial';
  document.getElementById('score-ok').textContent = scoreOk;
  document.getElementById('score-bad').textContent = scoreBad;
  document.getElementById('requeue-notice').classList.add('show');
}

// ══════════════════════════════════════════════
// NEXT / END
// ══════════════════════════════════════════════
function nextWord() {
  current++;
  // จบเมื่อผ่าน WORDS.length คำ (รวม re-queue แต่นับ unique จาก scoreOk+scoreBad)
  if (scoreOk + scoreBad >= WORDS.length && current >= queue.length) {
    showEndScreen(); return;
  }
  if (current >= queue.length) {
    showEndScreen(); return;
  }
  loadWord();
}

function showEndScreen() {
  document.getElementById('game-card').style.display = 'none';
  document.getElementById('end-screen').style.display = 'flex';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('end-score').textContent = scoreOk + '/' + WORDS.length;
  document.getElementById('end-hint-count').textContent = totalHintUsed;
  document.getElementById('end-requeue').textContent = totalRequeued;
  document.getElementById('end-streak').textContent = maxStreak;
  var pct = scoreOk / WORDS.length;
  var msg = pct >= 0.9 ? 'ยอดเยี่ยม! อ่านไทยเก่งมาก 🔥'
          : pct >= 0.7 ? 'ดีมาก! ลองเล่นอีกรอบจะยิ่งเก่งขึ้น'
          : pct >= 0.5 ? 'ไม่เลว! ยิ่งฝึกยิ่งจำได้ดีขึ้น'
          : 'ฝึกต่อไปนะ — ความสม่ำเสมอสำคัญที่สุด';
  document.getElementById('end-msg').textContent = msg;
}

function restartGame() { initGame(); }

initGame();
</script>
