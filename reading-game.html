// ══════════ HOME ══════════
function buildHome(){
  var counts={easy:0,vowel:0,hard:0,sentence:0};
  WORDS.forEach(function(w){ counts[w.b]++; });
  var list=document.getElementById('mode-list'); list.innerHTML='';
  Object.keys(MODES).forEach(function(key){
    var M=MODES[key];
    var btn=document.createElement('button');
    btn.className='mode-btn '+M.cls;
    btn.onclick=function(){ startMode(key); };
    var meta = M.soon ? '<span class="soon-tag">敬請期待</span>'
      : ('共 '+counts[key]+' 字 · 每組 '+M.setSize+' 字');
    btn.innerHTML='<span class="mode-emoji">'+M.emoji+'</span>'+
      '<span class="mode-info"><span class="mode-name">'+M.name+'</span>'+
      '<span class="mode-zh">'+M.zh+'</span>'+
      '<span class="mode-meta">'+meta+'</span></span>';
    list.appendChild(btn);
  });
}

function show(id){ ['home-screen','game-card','end-screen','soon-screen'].forEach(function(x){ document.getElementById(x).classList.toggle('hidden', x!==id); }); }

function startMode(key){
  curMode=key;
  if(MODES[key].soon){ show('soon-screen'); return; }
  bucketPool=WORDS.filter(function(w){ return w.b===key; });
  totalScore=0; maxStreak=0; totalHintUsed=0;
  newSet();
}

function newSet(){
  var size=Math.min(MODES[curMode].setSize, bucketPool.length);
  setWords=shuffle(bucketPool).slice(0,size);
  queue=setWords.map(function(_,i){ return { i:i, req:false }; });
  current=0; scoreOk=0; scoreBad=0; streak=0; totalRequeued=0;
  document.getElementById('q-total').textContent=setWords.length;
  show('game-card');
  loadWord();
}
function nextSet(){ newSet(); }
function backToMenu(){ buildHome(); show('home-screen'); }

// ══════════ WORD ══════════
function idxOf(c){ return queue[c].i; }
function curWord(){ return setWords[idxOf(current)]; }

function loadWord(){
  checked=false; hintUsedThisWord=false; isRequeuedWord=!!queue[current].req;
  var w=curWord(); correctSyls=w.reading.split('-');
  var done=Math.min(scoreOk+scoreBad, setWords.length);
  document.getElementById('progress-fill').style.width=(done/setWords.length*100)+'%';
  document.getElementById('q-num').textContent=Math.min(done+1,setWords.length);
  document.getElementById('score-ok').textContent=scoreOk;
  document.getElementById('score-bad').textContent=scoreBad;
  document.getElementById('score-total').textContent=totalScore;
  updateCombo();
  document.getElementById('word-th').textContent=w.th;
  document.getElementById('word-zh').textContent=w.zh;
  document.getElementById('word-mode').textContent=MODES[curMode].emoji+' '+MODES[curMode].name;
  document.getElementById('result-banner').className='result-banner';
  document.getElementById('reading-reveal').className='reading-reveal';
  document.getElementById('reading-full').textContent='';
  document.getElementById('requeue-notice').className='requeue-notice';
  document.getElementById('note-area').className='note-area';
  document.getElementById('note-text').textContent=w.note||'';
  document.getElementById('note-label').textContent='💡 讀音說明';
  document.getElementById('btn-hint').className='btn-hint';
  document.getElementById('btn-hint').style.display=w.note?'':'none';
  document.getElementById('btn-check').disabled=true;
  document.getElementById('btn-check').style.display='';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('btn-skip').style.display='';
  buildSlots(); buildChips();
}

function setReadingEn(w){ document.getElementById('reading-en').innerHTML='<span class="en-label">聲調讀音 TONE</span>'+(w.en||''); }
function updateCombo(){ var b=document.getElementById('combo-badge'); if(streak>=2){ b.classList.add('show'); document.getElementById('combo-num').textContent=streak; } else b.classList.remove('show'); }
function showHint(){ if(hintUsedThisWord) return; hintUsedThisWord=true; totalHintUsed++; document.getElementById('btn-hint').classList.add('used'); document.getElementById('note-label').textContent='💡 讀音說明（作答前先看 — 不計分/combo）'; document.getElementById('note-area').classList.add('show'); }

function buildSlots(){
  var row=document.getElementById('slots-row'); row.innerHTML=''; slots=[];
  correctSyls.forEach(function(syl,i){
    var wrap=document.createElement('div'); wrap.className='slot-wrap';
    var el=document.createElement('div'); el.className='slot';
    var num=document.createElement('span'); num.className='slot-num'; num.textContent=i+1;
    el.appendChild(num); el.onclick=function(){ slotClick(i); };
    var hint=document.createElement('div'); hint.className='slot-hint';
    wrap.appendChild(el); wrap.appendChild(hint); row.appendChild(wrap);
    slots.push({ el:el, val:null, hintEl:hint });
  });
}
function buildChips(){
  var row=document.getElementById('chips-row'); row.innerHTML=''; chips=[];
  var cur=curWord(); var pool=correctSyls.slice();
  var others=shuffle(WORDS.filter(function(w){ return w.th!==cur.th; }));
  var added=0, need=correctSyls.length*2+3;
  for(var wi=0; wi<others.length&&added<need; wi++){
    others[wi].reading.split('-').forEach(function(s){ if(pool.indexOf(s)===-1&&added<need){ pool.push(s); added++; } });
  }
  var maxChips=Math.min(correctSyls.length+5,12);
  pool=shuffle(pool).slice(0,maxChips);
  correctSyls.forEach(function(s){ if(pool.indexOf(s)===-1) pool.push(s); });
  pool=shuffle(pool);
  pool.forEach(function(syl,i){ var el=document.createElement('div'); el.className='chip'; el.textContent=syl; el.onclick=function(){ chipClick(i); }; row.appendChild(el); chips.push({el:el,syl:syl,used:false}); });
}
function chipClick(ci){
  if(checked||chips[ci].used) return;
  var t=-1; for(var i=0;i<slots.length;i++){ if(slots[i].val===null){ t=i; break; } } if(t===-1) return;
  chips[ci].used=true; chips[ci].el.classList.add('used'); slots[t].val=ci;
  var num=slots[t].el.querySelector('.slot-num'); slots[t].el.innerHTML=''; slots[t].el.appendChild(num);
  slots[t].el.appendChild(document.createTextNode(chips[ci].syl)); slots[t].el.classList.add('filled');
  document.getElementById('btn-check').disabled=slots.some(function(s){ return s.val===null; });
}
function slotClick(si){
  if(checked) return; var slot=slots[si]; if(slot.val===null) return;
  chips[slot.val].used=false; chips[slot.val].el.classList.remove('used'); slot.val=null;
  var num=slot.el.querySelector('.slot-num'); slot.el.innerHTML=''; slot.el.appendChild(num); slot.el.classList.remove('filled');
  document.getElementById('btn-check').disabled=true;
}

function checkAnswer(){
  checked=true;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-skip').style.display='none';
  document.getElementById('btn-next').style.display='';
  var correctCount=0;
  slots.forEach(function(slot,i){
    var u=chips[slot.val].syl, e=correctSyls[i];
    if(u===e){ slot.el.classList.add('correct'); slot.hintEl.textContent='✓'; slot.hintEl.className='slot-hint ok'; chips[slot.val].el.classList.add('correct-chip'); correctCount++; }
    else { slot.el.classList.add('wrong'); slot.hintEl.textContent='→ '+e; slot.hintEl.className='slot-hint'; chips[slot.val].el.classList.add('wrong-chip'); }
  });
  var allCorrect=correctCount===correctSyls.length;
  var banner=document.getElementById('result-banner');
  if(allCorrect){
    scoreOk++;
    var earned=0, mult=1, clean=!hintUsedThisWord&&!isRequeuedWord;
    if(clean){ streak++; maxStreak=Math.max(maxStreak,streak); mult=comboMult(streak); earned=Math.round(correctSyls.length*SCORE_CFG.PER_SYLLABLE*mult); totalScore+=earned; scorePop(earned,mult); }
    var msgs=['答對了！🎉','太棒了！✨','非常好！🌟','完美！💯'];
    var extra=clean?((streak>=3?' 🔥連對'+streak:'')+' +'+earned+'分'):'（看了說明/重複題 — 不計分）';
    banner.textContent=msgs[Math.floor(Math.random()*msgs.length)]+extra; banner.className='result-banner show perfect';
  } else {
    streak=0; scoreBad++;
    var got=correctCount+'/'+correctSyls.length+' 個音節正確';
    banner.textContent=(correctCount===0?'還沒對 — ':'差一點！— ')+got;
    banner.className='result-banner show '+(correctCount===0?'fail':'partial');
    requeueCurrent();
  }
  document.getElementById('reading-reveal').className='reading-reveal show';
  document.getElementById('reading-full').textContent=correctSyls.join(' · ');
  setReadingEn(curWord());
  var w=curWord();
  if(w.note){ document.getElementById('note-area').classList.add('show'); if(!hintUsedThisWord) document.getElementById('note-label').textContent='💡 為什麼這樣唸？'; }
  document.getElementById('score-ok').textContent=scoreOk;
  document.getElementById('score-bad').textContent=scoreBad;
  document.getElementById('score-total').textContent=totalScore;
  updateCombo();
}
function scorePop(pts,mult){ var p=document.createElement('div'); p.className='score-pop'; p.innerHTML='+'+pts+'分'+(mult>1?'<span class="mult">×'+mult+' combo!</span>':''); document.body.appendChild(p); setTimeout(function(){ if(p.parentNode) p.parentNode.removeChild(p); },1400); }
function requeueCurrent(){ var item={i:idxOf(current),req:true}; var at=current+1+Math.floor(Math.random()*3)+1; at=Math.min(at,queue.length); queue.splice(at,0,item); totalRequeued++; document.getElementById('requeue-notice').classList.add('show'); }
function skipWord(){
  checked=true; streak=0; scoreBad++; requeueCurrent();
  document.getElementById('btn-check').style.display='none'; document.getElementById('btn-skip').style.display='none'; document.getElementById('btn-next').style.display='';
  slots.forEach(function(slot){ if(slot.val!==null) chips[slot.val].el.classList.add('wrong-chip'); slot.el.classList.remove('filled'); });
  document.getElementById('reading-reveal').className='reading-reveal show';
  document.getElementById('reading-full').textContent=correctSyls.join(' · '); setReadingEn(curWord());
  var w=curWord(); if(w.note){ document.getElementById('note-label').textContent='💡 讀音說明'; document.getElementById('note-area').classList.add('show'); }
  var banner=document.getElementById('result-banner'); banner.textContent='已跳過 · 讀音：'+correctSyls.join('-'); banner.className='result-banner show partial';
  document.getElementById('score-bad').textContent=scoreBad; updateCombo();
}
function nextWord(){ current++; if(scoreOk>=setWords.length||current>=queue.length){ showEnd(); return; } loadWord(); }
function showEnd(){
  show('end-screen');
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('end-h2').textContent='完成一組！（'+MODES[curMode].name+'）';
  document.getElementById('end-score').innerHTML=totalScore+' <small>分</small>';
  document.getElementById('end-ok').textContent=scoreOk+'/'+setWords.length;
  document.getElementById('end-streak').textContent=maxStreak;
  document.getElementById('end-hint').textContent=totalHintUsed;
  var pct=scoreOk/setWords.length;
  document.getElementById('end-msg').textContent= pct>=0.9?'太棒了！讀得很熟 🔥':pct>=0.7?'很好！再來一組會更準':pct>=0.5?'不錯！多練幾次會記得更牢':'繼續加油 — 持之以恆最重要';
}

buildHome();
</script>
