<!DOCTYPE html>
<!-- 2026-07-06 新增：學生「連結 LINE 帳號」頁面，用 LIFF 拿 idToken，交給 Edge Function link-line 驗證後寫入 line_user_id -->
<!-- 連結成功後，這位學生才會收到「上課前 / 下課後」的自動 LINE 提醒（class-reminder-cron） -->
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連結 LINE 通知 — 泰華老師的線上教室</title>
<style>
  :root {
    --gold: #8B6310; --gold-bright: #C8973A; --gold-light: #F3E4C2; --gold-deep: #5a3e0a;
    --ink: #1C1C1C; --ink-soft: #333333; --ink-muted: #6b6b6b;
    --bg: #EDE7D9; --cream: #FAF4E8; --border: rgba(139,99,16,0.18);
    --amber: #b45309; --amber-dark: #78350f;
    --radius: 14px; --shadow: 0 4px 24px rgba(90,62,10,0.10), 0 1px 4px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink); font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: var(--cream); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 32px 24px; max-width: 420px; width: 100%; text-align: center;
  }
  .icon { font-size: 2.6rem; margin-bottom: 10px; }
  h1 { font-size: 1.15rem; color: var(--gold-deep); margin-bottom: 10px; }
  p { font-size: 0.9rem; color: var(--ink-muted); line-height: 1.7; margin-bottom: 8px; }
  .btn {
    display: inline-block; margin-top: 16px; background: linear-gradient(135deg,var(--gold-bright),var(--gold-deep));
    color: #fff; border: none; border-radius: 999px; padding: 12px 28px; font-size: 0.95rem;
    font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  }
  .status { margin-top: 14px; font-size: 0.85rem; font-weight: 600; min-height: 20px; }
  .status.ok { color: var(--gold-deep); } .status.err { color: var(--amber-dark); } .status.wait { color: var(--gold-deep); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">💬</div>
    <h1 id="titleText">連結 LINE 通知</h1>
    <p id="descText">連結後，上課前 / 下課後會自動收到 LINE 提醒，不用擔心忘記上課時間。</p>
    <div id="actionArea"></div>
    <div class="status wait" id="statusText">準備中…</div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff-config.js"></script>
  <script>
    // 2026-07-06 修正：liff.login() 導回來後，網址上自己加的 ?s=token 不保證還在
    // （LINE 官方自己也承認這個行為）→ 改成先把 token 存 localStorage 備份，
    // 導回來後网址掉了就從 localStorage 撈回來，不會再變成「網址缺少學生代碼」
    var urlParams = new URLSearchParams(window.location.search);
    var studentToken = urlParams.get('s') || '';
    if (studentToken) {
      localStorage.setItem('clsLineLinkToken', studentToken);
    } else {
      studentToken = localStorage.getItem('clsLineLinkToken') || '';
    }
    var statusEl = document.getElementById('statusText');
    var actionEl = document.getElementById('actionArea');

    function setStatus(msg, cls) { statusEl.textContent = msg; statusEl.className = 'status ' + (cls || 'wait'); }

    // 這個 Edge Function 網址跟 notify-line 同一個 Supabase 專案，只是不同 function 名稱
    var LINK_LINE_ENDPOINT = 'https://qzkxlhpcputsvbqmtqfi.supabase.co/functions/v1/link-line';
    // 2026-07-06 修正 401：Supabase Edge Function 預設一定要帶 anon key 才能呼叫，不然還沒進到我們自己的程式碼就先被擋 401
    // 這把 anon key 是公開用的（跟 classroom/index.html 裡用的同一把），本來就設計成可以放在前端網頁裡，安全性由後端 RLS 把關，不是這裡的密鑰外洩
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6a3hsaHBjcHV0c3ZicW10cWZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NjI1NDksImV4cCI6MjA5NzIzODU0OX0.1g80zxHfduq9RLdpus10hBDSEYWIXu2Jnqb6LsvqXpw';

    // 2026-07-16 หน้าด่าน "ต้องแอดเพื่อนก่อน": ปุ่มแอด OA + ปุ่มลองใหม่หลังแอดแล้ว
    // สีปุ่มใช้ธีมทองของเว็บ (กฎสีธีม) — ไม่ใช้เขียว LINE เพราะไม่ใช่ปุ่มทางการของ LINE
    function showAddFriendGate() {
      document.getElementById('titleText').textContent = '還差一步：先加老師好友';
      document.getElementById('descText').textContent = '要先加「泰華眼裡的世界」為 LINE 好友，才能收到上課提醒。加完好友後再按「我加好友了」。';
      actionEl.innerHTML =
        '<a class="btn" href="https://line.me/R/ti/p/%40010rhagu" target="_blank" rel="noopener">➕ 加老師好友</a>' +
        '<button class="btn" style="margin-left:8px" onclick="location.reload()">✅ 我加好友了</button>';
      setStatus('加好友後回到這頁，按「我加好友了」就會自動完成連結', 'err');
    }

    async function main() {
      if (!studentToken) {
        setStatus('❌ 連結無效：網址缺少學生代碼，請從自己的課堂頁面點「連結 LINE」按鈕進來', 'err');
        return;
      }
      if (!window.LIFF_CONFIG || !window.LIFF_CONFIG.liffId || window.LIFF_CONFIG.liffId === 'YOUR_LIFF_ID_HERE') {
        setStatus('⚠️ 老師還沒設定好 LIFF，請稍後再試或直接聯絡老師', 'err');
        return;
      }
      try {
        await liff.init({ liffId: window.LIFF_CONFIG.liffId });
      } catch (e) {
        setStatus('❌ LIFF 初始化失敗：' + (e.message || e), 'err');
        return;
      }
      if (!liff.isLoggedIn()) {
        // 2026-07-11 關鍵修正 400 Bad Request：
        //   400 / email 錯誤 / 驗證碼都只會出現在「access.line.me 網頁登入」那一頁，
        //   而那頁只有在「不是用 LINE App 開這個 LIFF」時（liff.login 網頁流程）才會跑到。
        //   → 所以只要還沒登入，就一律先把頁面導去 liff 連結，改由「LINE App」開啟，
        //     用手機裡已經登入的 LINE 身分自動帶入，完全不用打帳號 / 密碼 / 驗證碼，也永遠碰不到 access.line.me。
        //   完全不再呼叫 liff.login()（網頁登入）——那正是會 400 的來源。
        //   sessionStorage 記一次，避免電腦版 / 沒裝 App 時無限重導。
        if (!sessionStorage.getItem('clsLiffAutoRedirect')) {
          sessionStorage.setItem('clsLiffAutoRedirect', '1');
          setStatus('正在用 LINE 開啟，請稍候…', 'wait');
          window.location.replace('https://liff.line.me/' + window.LIFF_CONFIG.liffId + '?goto=linkline&s=' + encodeURIComponent(studentToken));
          return;
        }
        // 已導過一次仍未登入（多半是電腦版、或手機沒裝 LINE App）→ 不走網頁登入，改給按鈕請他用手機 LINE App 開，最穩不會壞。
        actionEl.innerHTML = '<a class="btn" href="https://liff.line.me/' + window.LIFF_CONFIG.liffId + '?goto=linkline&s=' + encodeURIComponent(studentToken) + '">📲 用手機 LINE App 開啟</a>';
        setStatus('請用手機的 LINE App 打開這個連結來完成連結（完全不用打帳號密碼）', 'err');
        return;
      }
      setStatus('取得 LINE 身分中…', 'wait');
      // 2026-07-16 ด่านที่ 1 (ฝั่งหน้าเว็บ): เช็คก่อนเลยว่าแอด OA เป็นเพื่อนแล้วหรือยัง
      // (liff.getFriendship ใช้ได้เพราะ channel ผูก OA แล้ว — Add friend option ใน LINE Developers Console)
      // ยังไม่แอด → โชว์ปุ่มแอดเพื่อน ไม่ต้องยิงผูกให้เสียเที่ยว · ฝั่ง server (link-line) มีด่านเดียวกันกันไว้อีกชั้น
      try {
        var fs = await liff.getFriendship();
        if (fs && fs.friendFlag === false) { showAddFriendGate(); return; }
      } catch (e) { /* เช็คไม่ได้ (เช่น scope ยังไม่มา) → ปล่อยผ่าน ให้ด่าน server ตัดสิน */ }
      // 2026-07-11 改用 access token（不用 idToken）：
      //   LINE 官方限制 idToken 1 小時就過期、且重新登入也不會換新 → 常常 "IdToken expired"。
      //   access token 由 LIFF SDK 自動維護，後端再拿去跟 LINE 驗證身分，穩定不會過期壞掉。
      var accessToken = liff.getAccessToken();
      if (!accessToken) {
        setStatus('❌ 拿不到 LINE 身分資訊，請重新從課堂頁面點一次連結', 'err');
        return;
      }
      setStatus('連結中…', 'wait');
      try {
        var res = await fetch(LINK_LINE_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ token: studentToken, accessToken: accessToken })
        });
        var data = await res.json().catch(function(){ return {}; });
        if (!res.ok || !data.ok) {
          // 2026-07-16: server ตอบ not_friend = ยังไม่ได้แอด OA → โชว์ปุ่มแอดเพื่อนแทน error ดิบ
          if (data.error === 'not_friend') { showAddFriendGate(); return; }
          // 2026-07-11 debug：把 LINE 回傳的真正原因 (detail) 也顯示出來，才不用瞎猜為什麼 verify 失敗
          setStatus('❌ 連結失敗：' + (data.error || res.status) + (data.detail ? ' — ' + data.detail : ''), 'err');
          return;
        }
        document.getElementById('titleText').textContent = '✅ 連結成功！';
        document.getElementById('descText').textContent = '之後上課前 / 下課後，會自動收到這個 LINE 帳號的提醒訊息。';
        setStatus('可以關閉這個頁面了', 'ok');
        localStorage.removeItem('clsLineLinkToken'); // 連結成功後清掉，避免殘留
        sessionStorage.removeItem('clsLiffAutoRedirect'); // 清掉自動重導旗標
      } catch (e) {
        setStatus('❌ 連結失敗：' + (e.message || e) + '（請檢查網路後重試）', 'err');
      }
    }
    main();
  </script>
</body>
</html>
