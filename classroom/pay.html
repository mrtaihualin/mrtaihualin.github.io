<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>繳費・入班 | 泰華眼裡的泰語教學</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#8B6310; --gold-bright:#C8973A; --gold-light:#F3E4C2; --gold-deep:#5a3e0a;
  --ink:#1C1C1C; --ink-soft:#333333; --ink-muted:#6b6b6b;
  --bg:#EDE7D9; --cream:#FAF4E8; --border:rgba(139,99,16,0.18);
  --amber:#b45309; --amber-dark:#78350f; --amber-muted:#92400e;
  --radius:14px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:'Noto Serif TC',serif;}
.wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px;}
.student-hero{background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));border-radius:var(--radius);padding:26px 20px;text-align:center;color:#fff;margin-bottom:16px;box-shadow:0 6px 20px rgba(139,99,16,0.25);}
.student-hero-avatar{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin:0 auto 10px;font-family:'Noto Serif TC',serif;}
.student-hero-name{font-size:1.25rem;font-weight:700;font-family:'Noto Serif TC',serif;}
.student-hero-sub{font-size:0.85rem;opacity:0.92;margin-top:4px;}
.card{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;}
.card h2{font-size:0.98rem;font-weight:700;margin:0 0 12px;color:var(--gold-deep);border-bottom:1px solid var(--border);padding-bottom:9px;}
.summary{font-size:0.92rem;line-height:2;}
.summary strong{color:var(--gold-deep);}
.pay-method{border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:9px;background:#fff;font-size:0.85rem;line-height:1.7;}
.pay-method .pm-title{font-weight:700;color:var(--gold-deep);margin-bottom:2px;}
.pm-qr{text-align:center;margin-top:9px;}
.pm-qr img{width:160px;max-width:66%;border-radius:10px;display:inline-block;}
.pm-cap{font-size:0.75rem;color:var(--ink-muted);margin-top:5px;}
.linkbox{display:flex;gap:8px;margin-top:6px;}
.linkbox input{flex:1;border:1.5px solid #e5d9b8;border-radius:9px;padding:9px 11px;font-size:0.78rem;font-family:'Noto Sans TC',sans-serif;color:var(--ink-soft);background:#fff;}
.note{font-size:0.8rem;color:var(--ink-muted);line-height:1.7;margin-top:8px;}
.btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));color:#fff;border:none;border-radius:11px;padding:13px 18px;font-size:0.95rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;width:100%;box-shadow:0 4px 12px rgba(139,99,16,0.22);}
.btn-gold:disabled{opacity:0.55;cursor:default;}
.btn-copy{flex-shrink:0;background:var(--gold-light);color:var(--gold-deep);border:1.5px solid var(--border);border-radius:9px;padding:0 14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;font-size:0.82rem;cursor:pointer;}
.btn-copy.copied{background:var(--gold-deep);color:#fff;border-color:var(--gold-deep);}
.meet-btn{display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));color:#fff;border-radius:11px;padding:14px;font-weight:700;font-size:0.95rem;font-family:'Noto Sans TC',sans-serif;}
.meet-locked{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;color:var(--ink-muted);border:1.5px dashed #d8c9a0;border-radius:11px;padding:14px;font-weight:700;font-size:0.9rem;cursor:not-allowed;}
.ghost-link{display:inline-block;font-size:0.8rem;color:var(--ink-muted);text-decoration:underline;font-family:'Noto Sans TC',sans-serif;}
/* course cards */
.course-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.course-card{border:1.5px solid #e5d9b8;border-radius:10px;padding:10px;background:#fff;cursor:pointer;text-align:left;font-family:'Noto Sans TC',sans-serif;}
.course-card.selected{border:2px solid var(--gold-deep);background:#fdf6e3;}
.course-card .c-name{font-weight:700;font-size:0.88rem;color:var(--ink);}
.course-card .c-desc{font-size:0.75rem;color:var(--ink-muted);margin-top:2px;}
.settings-label{display:block;font-size:0.8rem;font-weight:700;color:var(--gold-deep);margin:12px 0 5px;font-family:'Noto Sans TC',sans-serif;}
.settings-input{width:100%;border:1.5px solid #e5d9b8;border-radius:9px;padding:10px 12px;font-family:'Noto Sans TC',sans-serif;font-size:0.9rem;color:var(--ink);background:#fff;}
.pay-total-box{display:none;background:var(--gold-light);border-radius:10px;padding:12px 14px;margin-top:12px;text-align:center;}
.pay-total-box .big{font-size:1.15rem;font-weight:700;color:var(--gold-deep);font-family:'Noto Serif TC',serif;}
.pay-total-box .sub{font-size:0.78rem;color:var(--ink-muted);margin-top:3px;}
.slip-upload-area{border:1.5px dashed #d8c9a0;border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#fff;margin-top:4px;}
.slip-upload-area.has-image{padding:10px;}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(28,28,28,0.55);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto;z-index:100;}
.modal-overlay.open{display:flex;}
.modal{background:var(--cream);border-radius:var(--radius);padding:22px;max-width:480px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,0.3);}
.modal h3{margin:0 0 4px;font-size:1.05rem;color:var(--gold-deep);}
.modal-footer{display:flex;gap:10px;margin-top:18px;}
.btn-ghost{flex-shrink:0;background:#fff;color:var(--ink-soft);border:1.5px solid var(--border);border-radius:11px;padding:13px 18px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;}
.state-msg{text-align:center;padding:40px 20px;color:var(--ink-muted);}
.footer-note{text-align:center;font-size:0.78rem;color:var(--ink-muted);margin-top:8px;line-height:1.8;}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="state-msg" id="loadingMsg">載入中…</div>
</div>

<!-- ======= 繳費通知 MODAL ======= -->
<div class="modal-overlay" id="slipModal">
  <div class="modal">
    <h3>💰 繳費</h3>
    <p class="note" style="margin-top:2px;margin-bottom:6px;">選課程 → 選幣別 → 上傳匯款截圖 → 送出 → 等待老師確認</p>
    <label class="settings-label">課程方案</label>
    <div class="course-grid" id="slipCourseGrid"></div>
    <div id="slipPackWrap" style="display:none;margin-top:12px;">
      <label class="settings-label">堂數</label>
      <div id="slipPackGrid" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>
    <div id="slipCustomWrap" style="display:none;margin-top:12px;">
      <label class="settings-label">教學類型（單堂購買，不買課程包）</label>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button type="button" id="ctBtn-1on1" onclick="selectSlipCustomType('1on1')">👤 一對一</button>
        <button type="button" id="ctBtn-pair" onclick="selectSlipCustomType('pair')">👥 雙人共學</button>
      </div>
      <label class="settings-label">堂數</label>
      <input class="settings-input" id="slipCustomLessons" type="number" min="1" step="1" value="1" oninput="renderSlipTotalAndBank()">
      <label class="settings-label" style="margin-top:10px;">單價（每堂・可自行修改，例如特殊優惠價）</label>
      <input class="settings-input" id="slipCustomPricePer" type="number" min="0" placeholder="請輸入每堂單價" oninput="renderSlipTotalAndBank()">
      <div class="note" style="margin-top:4px;">參考價：一對一 NT 1,000 / 50分鐘・雙人共學 NT 1,500 / 50分鐘（泰銖或特殊價可自行修改單價）</div>
    </div>
    <div id="slipCurrencyWrap" style="display:none;margin-top:12px;">
      <label class="settings-label">付款幣別</label>
      <select class="settings-input" id="curSelect" onchange="selectSlipCurrency(this.value)">
        <option value="">— 請選擇 —</option>
        <option value="NTD">🇹🇼 NTD 台幣（銀行轉帳）</option>
        <option value="THB">🇹🇭 THB 泰銖（PromptPay）</option>
        <option value="WISE">🌍 Wise（國際匯款）</option>
      </select>
    </div>
    <div class="pay-total-box" id="slipTotalBox">
      <div class="big" id="slipTotalText"></div>
      <div class="sub" id="slipCalcText"></div>
    </div>
    <div id="slipActualAmountWrap" style="display:none;margin-top:12px;">
      <label class="settings-label">實際匯款金額 <span style="color:var(--amber);">*</span></label>
      <input class="settings-input" id="slipActualAmountInput" type="number" min="0" placeholder="請輸入實際轉帳金額" oninput="checkSlipAmountMatch()">
      <div id="slipAmountWarning" style="display:none;background:#fef3c7;border:1px solid #f5d78e;border-radius:9px;padding:9px 12px;margin-top:8px;font-size:0.82rem;color:#92400e;">
        ⚠️ 金額與方案不符（方案應為 <span id="slipExpectedAmountText"></span>）。如果是分期付款或非整包付款，請改選上方「自訂」。
      </div>
    </div>
    <div id="slipBankBox" style="display:none;background:#f8f4ea;border:1px solid #e5d9b8;border-radius:10px;padding:12px 14px;margin-top:10px;font-size:0.84rem;line-height:1.75;color:var(--ink);"></div>
    <label class="settings-label">匯款截圖 <span style="color:var(--amber);">*</span></label>
    <div class="slip-upload-area" id="slipUploadArea" onclick="document.getElementById('slipFileInput').click()">
      <div id="slipUploadPlaceholder" style="color:var(--ink-muted);font-size:0.88rem;">📎 點此上傳截圖</div>
      <img id="slipPreviewImg" style="max-width:100%;max-height:180px;display:none;border-radius:8px;margin-top:8px;" />
    </div>
    <input type="file" id="slipFileInput" accept="image/*" style="display:none" onchange="handleSlipImage(this.files[0])">
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeSlipModal()">取消</button>
      <button class="btn-gold" id="slipSubmitBtn" onclick="submitSlip()">📤 送出繳費</button>
    </div>
  </div>
</div>

<script src="../js/core/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ════════════════════════════════════════════════════════════
// 繳費・入班頁（老師把這個連結傳給新生）
// 資料來源：classroom_students（token 由「入班連結」產生，帶 pending_* 課程/課表資訊）
// 送出繳費：sb.rpc('submit_payment_slip')（跟主教室頁同一支 anon 安全 RPC）
// ⚠️ 下面 COURSE_TYPES / BANK_INFO / WISE_INFO 要跟 classroom/index.html 保持一致
// ════════════════════════════════════════════════════════════
var sb = (window.getSupabaseClient && window.getSupabaseClient()) ||
  (window.supabase && window.SUPABASE_CONFIG ? window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey) : null);

var urlParams = new URLSearchParams(window.location.search);
var token = urlParams.get('s') || '';

// ── 課程/價格（與 classroom/index.html 的 COURSE_TYPES 同步）──
var COURSE_TYPES = [
  { id:'basic',      label:'入門 Basic',    priceNTD:700,  priceTHB:700,  packs:[10],       note:'只限購買一期', desc:'打好發音基礎' },
  { id:'std',        label:'進階 Standard', priceNTD:800,  priceTHB:800,  packs:[10,20,30], desc:'客製主題會話' },
  { id:'pair_basic', label:'雙人 Basic',    priceNTD:1100, priceTHB:1100, packs:[10,20,30], desc:'Basic 雙人共學・每人' },
  { id:'pair_std',   label:'雙人 Standard', priceNTD:1200, priceTHB:1200, packs:[10,20,30], desc:'Standard 雙人共學・每人' },
];
function slipBonusFor(n){ return n >= 30 ? 3 : n >= 20 ? 1 : 0; }

var BANK_INFO = {
  NTD: { title:'🇹🇼 台灣銀行帳戶（匯 NTD）', qr:'../assets/pay-qr/ntd-ctbc.jpg', lines:[
    '銀行：中國信託 (822)','分行：城中分行 (0107)','帳號：107540587096','戶名：林泰華' ] },
  THB: { title:'🇹🇭 PromptPay（匯 THB）', qr:'../assets/pay-qr/thb-promptpay.jpg', lines:[
    'PromptPay：掃下方 QR 轉帳','戶名：นาย ไท่หัว หลิน（林泰華）','帳號：xxx-x-x7358-x','參考編號：004999017326389' ] }
};
var WISE_INFO = { qr:'../assets/pay-qr/wise.jpg', siteUrl:'https://wise.com', lines:[
  '收款人姓名：Taihua Lin','銀行名稱：Kasikorn Bank','Swift Code：KASITHBK','帳號：0208373587' ] };

var OFF_CUR = 'flex:1;padding:9px;border-radius:9px;border:1.5px solid #e5d9b8;background:#fff;cursor:pointer;font-family:\'Noto Sans TC\',sans-serif;font-size:0.86rem;';
var ON_CUR  = 'flex:1;padding:9px;border-radius:9px;border:2px solid var(--gold-deep);background:#fdf6e3;cursor:pointer;font-family:\'Noto Sans TC\',sans-serif;font-size:0.86rem;font-weight:700;';
var OFF_PACK = 'min-width:80px;flex:1;padding:9px 6px;border-radius:9px;border:1.5px solid #e5d9b8;background:#fff;cursor:pointer;font-family:\'Noto Sans TC\',sans-serif;font-size:0.86rem;text-align:center;';
var ON_PACK  = 'min-width:80px;flex:1;padding:9px 6px;border-radius:9px;border:2px solid var(--gold-deep);background:#fdf6e3;cursor:pointer;font-family:\'Noto Sans TC\',sans-serif;font-size:0.86rem;text-align:center;';

function escHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function safeHref(u){var s=String(u==null?'':u).trim();return /^https:\/\//i.test(s)?s:'#';}

// 2026-07-10 加入：跟 classroom/index.html 完全同一套邏輯（保持全站一致，只在一個地方維護規則）
// 老師設定上課時間一律當「泰國時間」(Asia/Bangkok, UTC+7 固定、無日光節約) 解讀，
// 絕對不能用 new Date(dateStr+'T'+timeStr) 直接 parse —— 那樣會被「執行這段程式的瀏覽器」自己的
// 時區誤判，這支頁面是學生自己打開的，瀏覽器時區跟老師（泰國）不一定一樣，會算錯。
var TEACHER_TZ = 'Asia/Bangkok';
function teacherTimeToDate(dateStr, timeStr) {
  return new Date(dateStr + 'T' + timeStr + ':00+07:00');
}
// 把一個絕對時間點（Date 物件）換算成某個時區當地的日期／時間／星期幾
function formatInTz(date, tz) {
  var parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false, weekday: 'short'
  }).formatToParts(date);
  var get = function(t) { var p = parts.find(function(x) { return x.type === t; }); return p ? p.value : ''; };
  var hour = get('hour'); if (hour === '24') hour = '00';
  var weekdayMap = { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 };
  return {
    dateStr: get('year') + '-' + get('month') + '-' + get('day'),
    timeStr: hour + ':' + get('minute'),
    weekday: weekdayMap[get('weekday')] !== undefined ? weekdayMap[get('weekday')] : new Date(date).getDay()
  };
}

// 這位學生的「上課頁」連結（confirm 前打開會看到『等待老師確認』頁，confirm 後就是完整教室頁）
// 邏輯跟 index.html 的 buildStudentUrl() 保持一致：沒有 meet → 只帶 token；有 meet → 帶 token + base64(name) + base64(meet)
// 注意：pay.html 是獨立頁面（跟 index.html 不同 JS 環境），不能讀 index.html 的 studentsCache，
// 改用 pay.html 自己從 Supabase 撈回來的學生資料（render(s) 傳進來的 s）當資料來源
function classroomLink(s){
  var baseUrl = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
  var t = (s && s.token) || token;
  if (!s || !s.meet) return baseUrl + '?s=' + encodeURIComponent(t);
  return baseUrl + '?s=' + encodeURIComponent(t) + '&n=' + btoa(encodeURIComponent(s.name)) + '&m=' + btoa(encodeURIComponent(s.meet));
}

var currentStudent = null;

// ════════════════════════ 載入 & 畫面 ════════════════════════
async function init(){
  if (!token){ renderInvalid('沒有帶入班代碼'); return; }
  if (!sb){ renderInvalid('系統連線失敗，請稍後再試或聯繫老師'); return; }
  var student = null;
  try {
    var res = await sb.rpc('get_student_by_token', { p_token: token });
    if (res.data) student = res.data;
  } catch(e){}
  if (!student){ renderInvalid('連結無效或已過期，請聯繫泰華老師取得正確連結'); return; }
  currentStudent = student;
  render(student);
  checkSlipStatus();
}

// 2026-07-19 加（AI 稽核橘色問題）：以前這頁出錯就只剩一行紅字、頁面上 0 個連結＝死路，
// 學生點到過期/被 LINE 截斷的連結就卡住，也不會去問老師。現在一定給出口。
function renderInvalid(msg){
  document.getElementById('wrap').innerHTML =
    '<div class="card"><div class="state-msg">❌ ' + escHtml(msg) + '</div>' +
    '<p class="note" style="text-align:center;">連結可能過期或被通訊軟體截斷了，直接問老師最快 🙏</p>' +
    '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:12px;">' +
      '<a href="https://lin.ee/yVBgvywy" target="_blank" rel="noopener" style="flex:1;min-width:150px;text-align:center;background:#06C755;color:#fff;text-decoration:none;border-radius:10px;padding:13px 18px;font-weight:700;font-family:\'Noto Sans TC\',sans-serif;min-height:44px;box-sizing:border-box;">💬 用 LINE 聯絡老師</a>' +
      '<a href="https://mrtaihualin.com/" style="flex:1;min-width:150px;text-align:center;background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));color:#fff;text-decoration:none;border-radius:10px;padding:13px 18px;font-weight:700;font-family:\'Noto Sans TC\',sans-serif;min-height:44px;box-sizing:border-box;">🏠 回首頁</a>' +
    '</div></div>';
}

function courseInfo(s){
  // 2026-07-14：自訂（單堂購買）以前不在 COURSE_TYPES 裡，課程摘要卡直接不顯示——
  // 現在自訂也能填優惠堂數了，補上自訂專用的顯示資料，卡片才會正常出現。
  var isCustom = s.pending_course_id === 'custom';
  var c = isCustom
    ? { label:'自訂（單堂購買）', desc:'單價／幣別由學生在繳費頁選' }
    : COURSE_TYPES.find(function(x){ return x.id === s.pending_course_id; });
  var lessons = s.pending_lessons || 0;
  return { c:c, lessons:lessons, isCustom:isCustom };
}

function render(s){
  var initial = s.name ? s.name.charAt(0) : '?';
  var confirmed = s.setup_status === 'confirmed' && s.meet;
  var html = '<div class="student-hero">' +
      '<div class="student-hero-avatar">' + escHtml(initial) + '</div>' +
      '<div class="student-hero-name">' + escHtml(s.name || '') + ' 同學</div>' +
      '<div class="student-hero-sub">' + (confirmed ? '已開通，歡迎進入課堂 ✨' : '歡迎加入！入班前請先完成繳費 🙏') + '</div>' +
    '</div>';

  html += courseSummaryCard(s);
  html += '<div id="slipStatusMsg"></div>';

  if (confirmed){
    // 老師已確認 → 上課連結開通
    html += '<div class="card"><h2>📹 進入課堂</h2>' +
      '<a class="meet-btn" href="' + escHtml(safeHref(s.meet)) + '" target="_blank" rel="noopener">📹 點此進入課堂</a>' +

function copyClsLink(){
  var input = document.getElementById('clsLinkInput');
  if (!input) return;
  var done = function(){ var b=document.getElementById('clsLinkCopyBtn'); if(!b)return; b.textContent='✅ 已複製'; b.classList.add('copied'); setTimeout(function(){b.textContent='複製';b.classList.remove('copied');},2000); };
  if (navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(input.value).then(done, function(){ input.select(); document.execCommand&&document.execCommand('copy'); done(); }); }
  else { input.select(); try{document.execCommand('copy');}catch(e){} done(); }
}

// 2026-07-10 修正：這裡以前直接印 s.pending_class_time（老師輸入的泰國時間原始字串），
// 沒有轉換成學生自己的時區，跟 index.html 的 buildCourseSummaryCard() 邏輯對不起來。
// 現在改成跟 index.html 完全一致：有選學生時區（pending_student_tz）→ 換算成學生的時間顯示；
// 沒選（舊資料）→ 照舊顯示泰國時間，維持原本行為。
function courseSummaryCard(s){
  var info = courseInfo(s);
  if (!info.c) return '';
  var c = info.c, lessons = info.lessons, isCustom = info.isCustom;
  // 2026-07-14：優惠堂數改成優先讀老師在「入班連結」時填的真實數字（pending_bonus_lessons）；
  // 沒有值（舊資料，還沒補這個欄位）才退回舊的自動公式（20堂送1／30堂送3）當備援。
  var bonus = (s.pending_bonus_lessons != null) ? (s.pending_bonus_lessons || 0) :
    (lessons ? slipBonusFor(lessons) : 0);
  var totalNTD = isCustom ? 0 : lessons * (c.priceNTD || 0);
  var totalTHB = isCustom ? 0 : lessons * (c.priceTHB || 0);
  var wk = ['日','一','二','三','四','五','六'];
  var line = '';
  var startDateObj = s.pending_start_date ? new Date(s.pending_start_date + 'T00:00:00') : null;
  if (s.pending_start_date && s.pending_class_time && s.pending_student_tz){
    var startAbs = teacherTimeToDate(s.pending_start_date, s.pending_class_time);
    var conv = formatInTz(startAbs, s.pending_student_tz);
    var studentDateObj = new Date(conv.dateStr + 'T00:00:00');
    line = '開課：' + (studentDateObj.getMonth()+1) + '月' + studentDateObj.getDate() + '日（週' + wk[studentDateObj.getDay()] + '）' + conv.timeStr;
  } else if (startDateObj && s.pending_class_time){
    line = '開課：' + (startDateObj.getMonth()+1) + '月' + startDateObj.getDate() + '日（週' + wk[startDateObj.getDay()] + '）' + s.pending_class_time;
  }
  return '<div class="card" style="border-top:2px solid var(--gold-bright);"><h2>📋 課程資訊</h2>' +
    '<div class="summary">' +
      '<div><strong>' + escHtml(c.label) + '</strong>' + (c.desc ? '　·　' + escHtml(c.desc) : '') + '</div>' +
      (lessons ? '<div>堂數：' + lessons + ' 堂' + (bonus ? '（贈 ' + bonus + ' 堂）' : '') + '</div>' : '') +
      (lessons && !isCustom ? '<div>費用：NTD ' + totalNTD.toLocaleString() + '　／　THB ' + totalTHB.toLocaleString() + '</div>' : '') +
      (line ? '<div>' + escHtml(line) + '</div>' : '') +
      (s.pending_recurring ? '<div style="color:var(--ink-muted);font-size:0.82rem;">🔁 每週固定上課</div>' : '') +
    '</div></div>';
}

// 只對「選現成方案」有效：比對學生填的「實際匯款金額」跟方案計算出來的金額是否一致
// 不一致不會擋送出（避免計算誤判卡到真的付對錢的學生），只顯示黃色提醒讓老師確認時多留意
function checkSlipAmountMatch(){
  var warnBox = document.getElementById('slipAmountWarning');
  var input = document.getElementById('slipActualAmountInput');
  if (slipType==='custom' || !slipType){ warnBox.style.display='none'; return; }
  var c = COURSE_TYPES.find(function(x){ return x.id===slipType; });
  if (!c || !slipLessons || !slipCurrency || !input || !input.value){ warnBox.style.display='none'; return; }
  var price = slipCurrency==='NTD'?c.priceNTD:c.priceTHB;
  if (!price){ warnBox.style.display='none'; return; }
  var amtCur = slipCurrency==='WISE'?'THB':slipCurrency;
  var expected = slipLessons*price;
  var actual = parseFloat(input.value) || 0;
  if (Math.round(actual) !== Math.round(expected)){
    document.getElementById('slipExpectedAmountText').textContent = amtCur+' '+expected.toLocaleString();
    warnBox.style.display='block';
  } else {
    warnBox.style.display='none';
  }
}

function handleSlipImage(file){
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var maxW=900, scale=Math.min(1,maxW/img.width);
      canvas.width=img.width*scale; canvas.height=img.height*scale;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      slipImageData=canvas.toDataURL('image/jpeg',0.75);
      document.getElementById('slipPreviewImg').src=slipImageData;
      document.getElementById('slipPreviewImg').style.display='block';
      document.getElementById('slipUploadPlaceholder').style.display='none';
      document.getElementById('slipUploadArea').classList.add('has-image');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function submitSlip(){
  if(!slipType){ alert('請先選擇課程'); return; }
  var lessons, bonus, price, courseLabel;
  if (slipType === 'custom'){
    lessons = parseInt(document.getElementById('slipCustomLessons').value,10) || 0;
    price = parseFloat(document.getElementById('slipCustomPricePer').value) || 0;
    bonus = 0;
    if (!lessons || !price){ alert('請填寫堂數和單價'); return; }
    var typeLabel = document.getElementById('ctBtn-pair').style.cssText.indexOf('gold-deep') !== -1 ? '雙人共學' : '一對一';
    courseLabel = '自訂・'+typeLabel+' '+lessons+'堂';
  } else {
    if(!slipLessons){ alert('請先選擇堂數'); return; }
    var c=COURSE_TYPES.find(function(x){return x.id===slipType;})||{};
    lessons = slipLessons;
    bonus = slipBonus;
    price=(slipCurrency==='NTD'?c.priceNTD:c.priceTHB)||0;
    courseLabel=(c.label||slipType)+' '+lessons+'堂'+(bonus?'（贈'+bonus+'）':'');
  }
  if(!slipCurrency){ alert('請先選擇付款幣別'); return; }
  if(!slipImageData){ alert('請先上傳匯款截圖'); return; }
  var payCur=slipCurrency==='WISE'?'THB':slipCurrency;
  courseLabel += (slipCurrency==='WISE'?'・Wise':'');
  var total = lessons*price;
  var note='';
  if (slipType !== 'custom'){
    var actualInput = document.getElementById('slipActualAmountInput');
    var actualVal = actualInput ? parseFloat(actualInput.value) : NaN;
    if (!isNaN(actualVal) && Math.round(actualVal) !== Math.round(total)){
      note = '⚠️ 學生填寫實際匯款金額為 '+payCur+' '+actualVal.toLocaleString()+'（與方案金額 '+payCur+' '+total.toLocaleString()+' 不同，請確認）';
    }
  }
  var studentName=(currentStudent&&currentStudent.name)?currentStudent.name:token;
  var btn=document.getElementById('slipSubmitBtn');
  btn.disabled=true; btn.textContent='送出中…';
  var res;
  try {
    res = await sb.rpc('submit_payment_slip', {
      p_token: token, p_student_name: studentName, p_course_id: slipType,
      p_course_label: courseLabel, p_lessons: lessons, p_bonus_lessons: bonus,
      p_price_per: price, p_currency: payCur, p_total_amount: total,
      p_note: note||null, p_slip_data: slipImageData
    });
  } catch(e){ res={ error:{ message:(e&&e.message)||String(e) } }; }
  btn.disabled=false; btn.textContent='📤 送出繳費';
  if (res && res.error){ alert('送出失敗：'+res.error.message); return; }
  notifyTeacherNewSlip({ name:studentName, course:courseLabel, lessons:lessons, bonus:bonus, currency:payCur, total:total, note:note });
  closeSlipModal();
  var statusEl=document.getElementById('slipStatusMsg');
  if (statusEl){ statusEl.innerHTML='<div style="background:#fef3c7;border-radius:10px;padding:11px 14px;font-size:0.85rem;color:#92400e;font-weight:600;margin-bottom:16px;">⏳ 已送出，等待老師確認<br><span style="font-weight:700;font-size:0.78rem;">'+escHtml(courseLabel)+'</span></div>'; }
  alert('✅ 繳費已送出！老師確認收款後，你的上課連結就會自動開通。');
}

function notifyTeacherNewSlip(d){
  try {
    var body={ access_key:'b3bfdb97-19dd-4910-bd15-89720be846c2', subject:'💰 新繳費通知 — '+(d.name||'學生'), from_name:'繳費入班頁',
      message:'學生：'+(d.name||'-')+'\n課程：'+(d.course||'-')+'\n堂數：'+(d.lessons||0)+' 堂'+(d.bonus?'（贈 '+d.bonus+' 堂）':'')+'\n金額：'+(d.currency||'')+' '+(d.total||0).toLocaleString()+(d.note?'\n備註：'+d.note:'')+'\n\n請至老師頁「⏳ 待確認繳費」確認收款並開立收據。' };
    fetch('https://api.web3forms.com/submit',{ method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body:JSON.stringify(body) }).catch(function(){});
  } catch(e){}
}

// 點暗色背景關 modal
document.addEventListener('click', function(e){
  var t=e.target;
  if (t && t.classList && t.classList.contains('modal-overlay')) t.classList.remove('open');
});

init();
</script>
