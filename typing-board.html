<script>
// ── GA4 Event Tracking: typing-board.html ───────────────────────────

// [1] คนเข้าดู leaderboard

document.addEventListener('click', function(e) {
  var a = e.target && e.target.closest ? e.target.closest('a[href*="games.html"], a[href*="tone-finder"], a[href*="reading-game"], a[href*="typing-game"]') : null;
  if (!a || !a.closest('.section-wrap')) return; // นับเฉพาะปุ่มในเนื้อหา ไม่นับเมนูบน
  gtag('event', 'play_again_click', { source: 'typing_leaderboard' });
});
// ────────────────────────────────────────────────────────────────────
