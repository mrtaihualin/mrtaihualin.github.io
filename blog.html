<!-- ข้อมูล + ตัวเรนเดอร์ กล่อง 貼文分享區 / 自學專區 (ย้ายมาจาก resources.html — Lin 2026-07-03) -->
<script src="posts-data.js"></script>

<script>
var P4 = (function () {
  function esc(s){ return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function renderPosts(){
    var el = document.getElementById('p4-post-list'); if (!el) return;
    if (typeof FB_POSTS === 'undefined' || !FB_POSTS.length){ el.innerHTML = '<div class="p4-list-empty">尚無貼文，敬請期待</div>'; return; }
    el.innerHTML = FB_POSTS.map(function (p){
      return '<div class="p4-li" onclick="P4.openPost(\'' + p.id + '\')"><div class="p4-li-head"><span class="p4-li-date">' + esc(p.date) + '</span><div class="p4-li-title">' + esc(p.title) + '</div></div></div>';
    }).join('');
  }
  function renderStudy(){
    var el = document.getElementById('p4-study-list'); if (!el) return;
    if (typeof SELFSTUDY_ARTICLES === 'undefined' || !SELFSTUDY_ARTICLES.length){ el.innerHTML = '<div class="p4-list-empty">尚無自學資源，敬請期待</div>'; return; }
    el.innerHTML = SELFSTUDY_ARTICLES.map(function (a){
      return '<div class="p4-li" onclick="P4.openStudy(\'' + a.id + '\')"><div class="p4-li-head"><span class="p4-li-date">' + esc(a.date) + '</span><div class="p4-li-title">' + esc(a.title) + '</div></div></div>';
    }).join('');
  }
  return {
    init: function (){ renderPosts(); renderStudy(); },
    openPost: function (id){ if (window.openFBPostModal) openFBPostModal(); if (window.showFBDetail) showFBDetail(id); },
    openStudy: function (id){ if (window.openSSModal) openSSModal(); if (window.showSSDetail) showSSDetail(id); },
    openLinkedPost: function (postId){ if (window.openLinkedFBPost) openLinkedFBPost(postId); },
    sharePost: function (id){
      var p = (typeof FB_POSTS !== 'undefined' ? FB_POSTS : []).find(function (x){ return x.id === id; });
      if (!p) return;
      var prev = p.text ? p.text.substring(0, 65).replace(/\n/g, ' ') + '…' : '';
      if (window.openSharePopup) openSharePopup(p.title, prev);
    },
    shareStudy: function (id){
      var a = (typeof SELFSTUDY_ARTICLES !== 'undefined' ? SELFSTUDY_ARTICLES : []).find(function (x){ return x.id === id; });
      if (!a) return;
      var prev = '';
      if (a.vocabulary && a.vocabulary.length){ var v = a.vocabulary[0]; prev = v.thai + '（' + v.phonetic + '）= ' + v.meaning; }
      if (window.openSharePopup) openSharePopup(a.title, prev);
    }
  };
})();
document.addEventListener('DOMContentLoaded', function (){ P4.init(); });
</script>
