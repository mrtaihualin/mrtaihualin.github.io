<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰語教材目錄</title>
<link rel="stylesheet" href="theme.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-zh-sans);
    font-size: 18px;
    line-height: 1.85;
    padding: 48px 16px 80px;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
  }

  h1 {
    font-family: var(--font-zh-serif);
    font-size: 2rem;
    color: var(--frame);
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--ink-mid);
    font-size: 0.95rem;
    margin-bottom: 40px;
  }

  .section-label {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .chapter-list {
    list-style: none;
    margin-bottom: 40px;
  }

  .chapter-list li {
    border-bottom: 1px solid var(--border);
  }

  .chapter-list a {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding: 14px 4px;
    text-decoration: none;
    color: var(--ink);
    transition: color 0.15s;
  }

  .chapter-list a:hover {
    color: var(--step);
  }

  .chapter-num {
    font-size: 0.8rem;
    color: var(--ink-light);
    min-width: 32px;
  }

  .chapter-title {
    font-size: 1rem;
  }

  .chapter-sub {
    font-size: 0.85rem;
    color: var(--ink-mid);
    margin-left: auto;
  }

  #btn-bigfont {
    position: fixed; top: 14px; right: 14px; z-index: 9999;
    background: var(--step); color: #fff;
    border: none; border-radius: 8px;
    padding: 6px 13px; font-size: 15px; font-weight: 600;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.18);
    font-family: var(--font-zh-sans);
  }
  body.big-font { font-size: 22px; }
  body.big-font #btn-bigfont { background: var(--c-aux); }
</style>
</head>
<body>
<div class="page">

  <h1>泰語教材目錄</h1>
  <p class="subtitle">泰華眼裡的泰語教學</p>

  <p class="section-label">拼音基礎</p>
  <ul class="chapter-list">
    <li>
      <a href="拼音規則總整理.html">
        <span class="chapter-num">01</span>
        <span class="chapter-title">拼音規則總整理</span>
      </a>
    </li>
  </ul>

  <p class="section-label">句子結構與文法</p>
  <ul class="chapter-list">
    <li>
      <a href="thai_grammar_p2.html">
        <span class="chapter-num">02</span>
        <span class="chapter-title">泰語句子結構 五步驟學習法</span>
      </a>
    </li>
    <li>
      <a href="thai_grammar_p3.html">
        <span class="chapter-num">03</span>
        <span class="chapter-title">情態助詞</span>
      </a>
    </li>
    <li>
      <a href="thai_grammar_p4.html">
        <span class="chapter-num">04</span>
        <span class="chapter-title">否定表達</span>
      </a>
    </li>
    <li>
      <a href="thai_grammar_p5.html">
        <span class="chapter-num">05</span>
        <span class="chapter-title">過去式</span>
      </a>
    </li>
    <li>
      <a href="thai_grammar_p6.html">
        <span class="chapter-num">06</span>
        <span class="chapter-title">是非問句</span>
      </a>
    </li>
    <li>
      <a href="thai_grammar_p7.html">
        <span class="chapter-num">07</span>
        <span class="chapter-title">疑問詞</span>
      </a>
    </li>
  </ul>

</div>
<button id="btn-bigfont">A＋</button>
<script>
(function(){
  var btn = document.getElementById('btn-bigfont');
  var LS = window.localStorage;
  function apply(on){ document.body.classList.toggle('big-font',on); btn.textContent = on ? 'A－' : 'A＋'; }
  try{ apply(LS.getItem('cui-big-font')==='1'); }catch(e){}
  btn.addEventListener('click',function(){
    var on = !document.body.classList.contains('big-font');
    apply(on);
    try{ LS.setItem('cui-big-font', on?'1':'0'); }catch(e){}
  });
})();
</script>
</body>
</html>
