}

// ============================================================
// 課堂錄製引擎（統一：只錄聲音 / 雙人聲音 / 影片）
//   - 聲音：Opus ~24kbps（約 11 MB/小時，最低可聽）
//   - 影片：~80kbps，約 45–50 MB/小時；滿 1 小時自動切檔續錄
// ============================================================
const REC_AUDIO_BPS=24000;       // 聲音位元率（約 11 MB/小時）
const REC_VIDEO_BPS=80000;       // 影片位元率（約 45–50 MB/小時）
const REC_SPLIT_MS=60*60*1000;   // 滿 1 小時自動切檔

let recMethod=null, recState='idle';
let recDisplayStream=null, recMicStream=null, recAudioCtx=null;
let recMR=null, recChunks=[], recMime='', recIsVideo=false, recNoSysAudio=false;
let recTimerID=null, recSplitID=null, recStartTime=0, recPart=0, recPartCount=0;

function recFmtTime(sec){ return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0'); }
function recSetStatus(t,cls){ const e=document.getElementById('recStatus'); if(e){ e.textContent=t; e.className='status'+(cls?' '+cls:''); } }
function recToggleStartBtns(disabled){ ['recVideoBtn'].forEach(id=>{ const b=document.getElementById(id); if(b) b.disabled=disabled; }); }

// 按鈕直接呼叫（點擊即為使用者手勢，可呼叫 getDisplayMedia）
let recActiveStudent=null;
function startRec(method){ if(recState!=='recording') beginRecording(method); }
// 一般錄影鈕：未綁定特定學生 → 清除綁定，避免自動上傳到上一位學生的資料夾
function startRecGeneric(){ recActiveStudent=null; startRec('video'); }
// 老師端：點某位學生 → 開該生 Meet + 開始錄影（recActiveStudent 供日後上傳到該生 Drive 資料夾使用）
function openTabReliably(url){
  // 用 <a> 觸發開新分頁（與可正常運作的 🎥 Meet 按鈕相同方式，避免 window.open 在本頁變空白頁）
  const a=document.createElement('a');
  a.href=url; a.target='_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); a.remove();
}
function startClassRec(token){
  const s=(typeof studentsCache!=='undefined')?studentsCache[token]:null;
  if(!s){ alert('找不到學生資料'); return; }
  recActiveStudent=token;
  const card=document.getElementById('recCard'); if(card) card.style.display='';   // 顯示錄製面板
  const title=document.getElementById('recCardTitle'); if(title) title.textContent='課堂錄製 — '+(s.name||token);
  if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
  if(s.meet) openTabReliably(s.meet);   // 先開 Meet 分頁（分享分頁音訊需分頁先存在）
  startRec('video');                    // 再開始錄影
}

// — 格式偵測（優先 mp4／m4a，相容 iPhone 播放）—
function recPickVideoMime(){
  const t=['video/mp4;codecs=avc1.42E01E,mp4a.40.2','video/mp4','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  return t.find(x=>MediaRecorder.isTypeSupported(x))||'';
}
function recPickAudioMime(){
  const t=['audio/mp4;codecs=mp4a.40.2','audio/mp4','audio/webm;codecs=opus','audio/ogg;codecs=opus','audio/webm'];
  return t.find(x=>MediaRecorder.isTypeSupported(x))||'';
}

async function beginRecording(method){
  recMethod=method; recPart=0; recPartCount=0; recNoSysAudio=false;
  const dl=document.getElementById('recDownloads'); if(dl) dl.innerHTML='';
  document.getElementById('recAudioPlayer').style.display='none';
  document.getElementById('recVideoPlayer').style.display='none';
  recSetStatus('準備中…');
  try{
    let finalStream;
    if(method==='mic'){
      recMicStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      finalStream=recMicStream; recIsVideo=false;
    }else{
      recIsVideo=(method==='video');
      recDisplayStream=await navigator.mediaDevices.getDisplayMedia({
        video: recIsVideo ? {frameRate:{ideal:10,max:15}} : true,
        audio: true
      });
      recMicStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      const sysTracks=recDisplayStream.getAudioTracks();
      recAudioCtx=new (window.AudioContext||window.webkitAudioContext)();
      const dest=recAudioCtx.createMediaStreamDestination();
      recAudioCtx.createMediaStreamSource(recMicStream).connect(dest);
      const sysOK=sysTracks.length>0;
      if(sysOK) recAudioCtx.createMediaStreamSource(new MediaStream(sysTracks)).connect(dest);
      if(recIsVideo){
        finalStream=new MediaStream([...recDisplayStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
      }else{
        recDisplayStream.getVideoTracks().forEach(t=>t.stop());
        finalStream=new MediaStream([...dest.stream.getAudioTracks()]);
      }
      recNoSysAudio=!sysOK;
      const vTrack=recDisplayStream.getVideoTracks()[0];
      if(vTrack) vTrack.onended=()=>{ if(recState==='recording') stopRecording(); };
    }
    startSegment(finalStream);
  }catch(err){
    recSetStatus('❌ '+(err.message||err.name||'無法開始錄製'),'');
    cleanupRecStreams();
  }
}

function startSegment(stream){
  recMime = recIsVideo ? recPickVideoMime() : recPickAudioMime();
  if(recIsVideo && !recMime){ recSetStatus('❌ 此瀏覽器不支援影片錄製，請改用電腦版 Chrome',''); cleanupRecStreams(); return; }
  const opts = recIsVideo
    ? {mimeType:recMime||undefined, videoBitsPerSecond:REC_VIDEO_BPS, audioBitsPerSecond:REC_AUDIO_BPS}
    : {mimeType:recMime||undefined, audioBitsPerSecond:REC_AUDIO_BPS};
  recMR=new MediaRecorder(stream, opts);
  recChunks=[]; recPart++;
  recMR.ondataavailable=e=>{ if(e.data&&e.data.size) recChunks.push(e.data); };
  recMR.onstop=()=>finalizeSegment();
  recMR.start(1000);
  recState='recording';
  recStartTime=Date.now();
  recToggleStartBtns(true);
  document.getElementById('recStopBtn').disabled=false;
  const tEl=document.getElementById('recTimer'); if(tEl) tEl.classList.add('visible');
  clearInterval(recTimerID);
  recTimerID=setInterval(()=>{ const e=document.getElementById('recTimer'); if(e) e.textContent=recFmtTime(Math.floor((Date.now()-recStartTime)/1000)); },1000);
  recSetStatus('🔴 錄製中…'+(recIsVideo?'（影片）':'（聲音）')+(recPart>1?'　第'+recPart+'段':'')+(recNoSysAudio?'　⚠️未含對方聲音（沒勾「分享分頁音訊」）':''),'active');
  if(recIsVideo){
    clearTimeout(recSplitID);
    recSplitID=setTimeout(()=>{ if(recState==='recording') splitSegment(stream); }, REC_SPLIT_MS);
  }
}

// 滿 1 小時：結束目前片段，於同一串流續錄新檔（毋須重新授權）
function splitSegment(stream){
  if(!recMR||recMR.state==='inactive') return;
  recMR.onstop=()=>{ finalizeSegment(); startSegment(stream); };
  recMR.stop();
}

function finalizeSegment(){
  const mime=recMime||(recIsVideo?'video/webm':'audio/webm');
  const blob=new Blob(recChunks,{type:mime});
  if(!blob.size) return;
  recPartCount++;
  const isVideo=recIsVideo;
  const ext = isVideo ? (mime.includes('mp4')?'mp4':'webm')
                      : (mime.includes('mp4')?'m4a':(mime.includes('ogg')?'ogg':'webm'));
  const url=URL.createObjectURL(blob);
  const player=document.getElementById(isVideo?'recVideoPlayer':'recAudioPlayer');
  player.src=url; player.style.display='block';
  document.getElementById('recOutSection').classList.add('visible');
  const sizeMB=(blob.size/1048576).toFixed(1);
  const name=(isVideo?'video':'audio')+'_'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+(recPartCount>1?'_part'+recPartCount:'')+'.'+ext;
  const a=document.createElement('a');
  a.href=url; a.download=name; a.className='btn btn-download';
  a.style.cssText='width:100%;justify-content:center;margin-top:8px;display:flex;';
  a.textContent='⬇ 下載'+(isVideo?'影片':'聲音')+'（'+sizeMB+' MB）'+(recPartCount>1?'·第'+recPartCount+'段':'');
  document.getElementById('recDownloads').appendChild(a);
  // 若此次錄影綁定了學生 → 自動上傳到該生的 Google Drive 資料夾
  if(recActiveStudent){
    const upRow=document.createElement('div');
    upRow.style.cssText='font-size:0.8rem;color:var(--ink-muted);margin-top:6px;font-family:\'Noto Sans TC\',sans-serif;';
    upRow.textContent='☁️ 準備上傳到雲端…';
    document.getElementById('recDownloads').appendChild(upRow);
    autoUploadRecording(blob, name, recActiveStudent, sizeMB, recPartCount, upRow);
  }
}

async function autoUploadRecording(blob, fileName, token, sizeMB, part, statusEl){
  const s=(typeof studentsCache!=='undefined' && studentsCache[token])?studentsCache[token]:{name:token};
  const setMsg=(t)=>{ if(statusEl) statusEl.textContent=t; };
  try{
    setMsg('☁️ 連線 Google Drive…（首次會跳出 Google 授權）');
    // 影片 → mrtaihualin 課堂錄影 / 學生名 / 影片
    const stuFolderId=await gdGetStudentSubfolderId(s.name||token, '影片');
    setMsg('☁️ 上傳中（'+sizeMB+' MB）…請勿關閉分頁');
    const up=await gdUpload(blob, fileName, stuFolderId);
    await gdShareAnyone(up.id);
    const link=up.webViewLink||('https://drive.google.com/file/d/'+up.id+'/view');
    await saveRecordingLink(token, s.name||token, up.id, link, sizeMB, part);
    if(statusEl) statusEl.innerHTML='✅ 已上傳到「'+(s.name||token)+'」雲端資料夾　<a href="'+link+'" target="_blank" rel="noopener" style="color:var(--amber-dark);font-weight:700;">開啟</a>';
  }catch(err){
    setMsg('⚠️ 自動上傳失敗：'+(err.message||err)+'（已保留上方下載按鈕，可手動存檔）');
  }
}

function stopRecording(){
  clearTimeout(recSplitID); recSplitID=null;
  clearInterval(recTimerID); recTimerID=null;
  const tEl=document.getElementById('recTimer'); if(tEl) tEl.classList.remove('visible');
  recState='idle';
  if(recMR && recMR.state!=='inactive'){ recMR.onstop=()=>finalizeSegment(); recMR.stop(); }
  cleanupRecStreams();
  recToggleStartBtns(false);
  document.getElementById('recStopBtn').disabled=true;
  recSetStatus('✅ 錄製完成，可預覽或下載','done');
}

function cleanupRecStreams(){
  [recDisplayStream,recMicStream].forEach(s=>{ if(s) s.getTracks().forEach(t=>t.stop()); });
  recDisplayStream=null; recMicStream=null;
  if(recAudioCtx){ try{recAudioCtx.close();}catch(e){} recAudioCtx=null; }
}
</script>
