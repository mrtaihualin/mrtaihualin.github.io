<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>คลังคำของฉัน · mrtaihualin.com</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="shared.css?v=12">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<script src="word-vault.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:#fdf8ef;min-height:100vh;padding-bottom:80px;}
.vault-page{max-width:680px;margin:0 auto;padding:16px;}

/* header */
.vault-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.vault-title{font-size:22px;font-weight:700;color:#5a3e0a;font-family:'Noto Sans TC',sans-serif;}
.vault-count-chip{font-size:13px;background:rgba(139,99,16,0.12);color:#8B6310;border-radius:20px;padding:3px 12px;}
.vault-back{font-size:13px;color:#8B6310;text-decoration:none;display:flex;align-items:center;gap:4px;margin-right:auto;}
.vault-back:hover{text-decoration:underline;}

/* filter bar */
.vault-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.vtag-btn{font-size:12px;font-family:'Sarabun',sans-serif;padding:5px 14px;border-radius:20px;border:1.5px solid rgba(139,99,16,0.3);background:#fff;color:#5a3e0a;cursor:pointer;transition:all .15s;}
.vtag-btn.active,.vtag-btn:hover{background:#8B6310;color:#fff;border-color:#8B6310;}

/* word cards */
.vault-list{display:flex;flex-direction:column;gap:10px;}
.vault-card{background:#fff;border:1.5px solid rgba(139,99,16,0.15);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(90,62,10,0.06);}
.vault-card-word{font-size:32px;font-weight:700;color:#3a2a0a;min-width:56px;text-align:center;line-height:1.3;}
.vault-card-info{flex:1;}
.vault-card-zh{font-size:13px;color:#888;font-family:'Noto Sans TC',sans-serif;}
.vault-card-en{font-size:12px;color:#aaa;margin-top:2px;}
.vault-card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.vault-tag-chip{font-size:11px;padding:2px 10px;border-radius:12px;cursor:pointer;border:1.5px solid;transition:all .15s;}
.vault-tag-chip.active{color:#fff;}
.vault-tag-chip[data-tag="อยากฝึก"]{border-color:#e07a30;color:#e07a30;}
.vault-tag-chip[data-tag="อยากฝึก"].active{background:#e07a30;}
.vault-tag-chip[data-tag="เป็นแล้ว"]{border-color:#3aaa6a;color:#3aaa6a;}
.vault-tag-chip[data-tag="เป็นแล้ว"].active{background:#3aaa6a;}
.vault-tag-chip[data-tag="ชอบ"]{border-color:#e05080;color:#e05080;}
.vault-tag-chip[data-tag="ชอบ"].active{background:#e05080;}
.vault-card-delete{font-size:18px;cursor:pointer;color:#ccc;padding:4px;border:none;background:none;border-radius:6px;transition:color .15s;}
.vault-card-delete:hover{color:#e05050;}
.vault-card-source{font-size:10px;color:#bbb;margin-top:3px;}

/* empty */
.vault-empty{text-align:center;padding:60px 20px;color:#aaa;}
.vault-empty-icon{font-size:48px;margin-bottom:12px;}
.vault-empty-text{font-size:15px;line-height:1.7;}
.vault-empty a{color:#8B6310;text-decoration:underline;}

/* game links */
.vault-game-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.vault-game-btn{flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:700;
  background:#fff;border:1.5px solid rgba(139,99,16,0.3);color:#5a3e0a;transition:all .15s;}
.vault-game-btn:hover{background:#f3e4c2;border-color:#C8973A;}

/* bottom nav */
#game-switcher{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:0;background:rgba(255,255,255,0.97);border:1.5px solid #d4b87a;border-radius:999px;box-shadow:0 4px 20px rgba(90,62,10,0.18);z-index:999;overflow:hidden;font-family:'Noto Sans TC',sans-serif;backdrop-filter:blur(8px);}
.gs-tab{display:flex;align-items:center;padding:10px 18px;font-size:13px;color:#8B6310;text-decoration:none;white-space:nowrap;transition:background .15s;}
.gs-tab:hover,.gs-tab.gs-active{background:rgba(139,99,16,0.1);}
.gs-divider{width:1px;background:#d4b87a;margin:8px 0;}
@media(max-width:768px){#game-switcher{bottom:calc(8px + env(safe-area-inset-bottom,0px));}}
</style>
</head>
<body>
<div class="vault-page">

  <div class="vault-header">
    <a class="vault-back" href="javascript:history.back()">← กลับ</a>
    <span class="vault-title">🔖 คลังคำของฉัน</span>
    <span class="vault-count-chip" id="vault-total-count"></span>
  </div>

  <div class="vault-game-btns">
    <a class="vault-game-btn" href="tone-finder.html">🎵 เกมเสียง</a>
    <a class="vault-game-btn" href="reading-game.html">📝 เกมอ่าน</a>
  </div>

  <div class="vault-filter-bar" id="vault-filter-bar">
    <button class="vtag-btn active" data-filter="all" onclick="setFilter('all',this)">ทั้งหมด</button>
    <button class="vtag-btn" data-filter="อยากฝึก" onclick="setFilter('อยากฝึก',this)">🟠 อยากฝึก</button>
    <button class="vtag-btn" data-filter="เป็นแล้ว" onclick="setFilter('เป็นแล้ว',this)">✅ เป็นแล้ว</button>
    <button class="vtag-btn" data-filter="ชอบ" onclick="setFilter('ชอบ',this)">❤️ ชอบ</button>
  </div>

  <div class="vault-list" id="vault-list"></div>

</div>

<div id="game-switcher">
  <a class="gs-tab" href="tone-finder.html">🎵 聲調搜尋</a>
  <div class="gs-divider"></div>
  <a class="gs-tab" href="reading-game.html">📝 拼讀練習</a>
  <div class="gs-divider"></div>
  <span class="gs-tab gs-active">🔖 คลัง</span>
</div>

<script>
var TAGS = ['อยากฝึก','เป็นแล้ว','ชอบ'];
var TAG_COLORS = {'อยากฝึก':'#e07a30','เป็นแล้ว':'#3aaa6a','ชอบ':'#e05080'};
var currentFilter = 'all';

function sourceLabel(s){
  if(s==='tone-finder') return '🎵 เกมเสียง';
  if(s==='reading-game') return '📝 เกมอ่าน';
  return s || '';
}

function renderList(){
  var words = WordVault.getAll();
  // sort: newest first
  words = words.slice().sort(function(a,b){ return (b.saved_at||0)-(a.saved_at||0); });

  var filtered = currentFilter === 'all' ? words
    : words.filter(function(w){ return w.tags && w.tags.indexOf(currentFilter) !== -1; });

  var count = document.getElementById('vault-total-count');
  count.textContent = words.length + ' คำ';

  var list = document.getElementById('vault-list');
  if(!filtered.length){
    list.innerHTML = '<div class="vault-empty">' +
      '<div class="vault-empty-icon">🔖</div>' +
      '<div class="vault-empty-text">' +
        (currentFilter==='all'
          ? 'ยังไม่มีคำในคลัง<br>ไปเล่น <a href="tone-finder.html">เกมเสียง</a> หรือ <a href="reading-game.html">เกมอ่าน</a> แล้วกด 🔖 เซฟคำได้เลย'
          : 'ไม่มีคำในหมวดนี้') +
      '</div></div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(function(w){
    var card = document.createElement('div');
    card.className = 'vault-card';

    // tag chips
    var tagHtml = '<div class="vault-card-tags">';
    TAGS.forEach(function(tag){
      var on = w.tags && w.tags.indexOf(tag) !== -1;
      tagHtml += '<button class="vault-tag-chip'+(on?' active':'')+'" data-tag="'+tag+'" '+
        'style="'+(on?'background:'+TAG_COLORS[tag]+';color:#fff;border-color:'+TAG_COLORS[tag]+';':'')+'" '+
        'onclick="toggleTag(\''+w.th+'\',\''+tag+'\',this)">'+tag+'</button>';
    });
    tagHtml += '</div>';

    card.innerHTML =
      '<div class="vault-card-word">'+w.th+'</div>'+
      '<div class="vault-card-info">'+
        '<div class="vault-card-zh">'+(w.zh||'')+'</div>'+
        '<div class="vault-card-en">'+(w.en||'')+'</div>'+
        (w.source?'<div class="vault-card-source">'+sourceLabel(w.source)+'</div>':'')+
        tagHtml+
      '</div>'+
      '<button class="vault-card-delete" title="ลบออกจากคลัง" onclick="deleteWord(\''+w.th+'\')">✕</button>';

    list.appendChild(card);
  });
}

function toggleTag(th, tag, btn){
  var on = btn.classList.contains('active');
  WordVault.setTag(th, tag, !on);
  renderList();
}

function deleteWord(th){
  WordVault.removeWord(th);
  renderList();
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.vtag-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderList();
}

WordVault.injectStyles();
renderList();
</script>
</body>
</html>
