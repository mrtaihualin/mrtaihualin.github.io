// ─────────────────────────────────────────────────────────────
// P4  —  Page 4 logic (video grid + list renders)
// ─────────────────────────────────────────────────────────────
var P4 = (function () {
  var API_KEY = 'AIzaSyBIY9Mg41RXLNkgDTq1ZyiJnCMrp_3BEeI';
  var CHANNEL = 'mrtaihua';
  var _all    = [];   // all fetched videos
  var _ready  = false;

  // ── Helpers ──────────────────────────────────────────────
  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function pick(n) {
    var pool = _all.slice(), result = [];
    while (result.length < n && pool.length > 0)
      result.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
    return result;
  }

  // คลิปแรก = คลิปใหม่สุดเสมอ, ที่เหลือสุ่ม
  function newestPlusPick(n) {
    if (!_all.length) return [];
    var rest = _all.slice(1), picked = [];
    while (picked.length < n - 1 && rest.length > 0)
      picked.push(rest.splice(Math.floor(Math.random() * rest.length), 1)[0]);
    return [_all[0]].concat(picked);
  }

  // ── Video grid ───────────────────────────────────────────
  function renderGrid(videos) {
    var g = document.getElementById('p4-video-grid');
    if (!g) return;
    if (!videos.length) {
      g.innerHTML = '<div class="p4-grid-msg">📺 影片即將上線，敬請期待</div>';
      return;
    }
    g.innerHTML = videos.map(function (v, i) {
      return '<div class="p4-vc" data-id="' + esc(v.id) + '" onclick="P4.play(this)">' +
        '<div class="p4-vc-thumb">' +
          '<img src="https://img.youtube.com/vi/' + esc(v.id) + '/hqdefault.jpg" alt="' + esc(v.title) + '" loading="lazy">' +
          (i === 0 ? '<div class="p4-vc-badge">最新</div>' : '') +
          '<div class="p4-vc-play"><span>▶</span></div>' +
        '</div>' +
        '<div class="p4-vc-title">' + esc(v.title) + '</div>' +
      '</div>';
    }).join('');
  }

  // ── Lists ─────────────────────────────────────────────────
  function renderPosts() {
    var el = document.getElementById('p4-post-list');
    if (!el) return;
    if (!FB_POSTS || !FB_POSTS.length) {
      el.innerHTML = '<div class="p4-list-empty">尚無貼文，敬請期待</div>';
      return;
    }
    el.innerHTML = FB_POSTS.map(function (p) {
      return '<div class="p4-li" onclick="P4.openPost(\'' + p.id + '\')">' +
        '<div class="p4-li-head">' +
          '<span class="p4-li-date">' + esc(p.date) + '</span>' +
          '<div class="p4-li-title">' + esc(p.title) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function renderStudy() {
    var el = document.getElementById('p4-study-list');
    if (!el) return;
    if (!SELFSTUDY_ARTICLES || !SELFSTUDY_ARTICLES.length) {
      el.innerHTML = '<div class="p4-list-empty">尚無自學資源，敬請期待</div>';
      return;
    }
    el.innerHTML = SELFSTUDY_ARTICLES.map(function (a) {
      return '<div class="p4-li" onclick="P4.openStudy(\'' + a.id + '\')">' +
        '<div class="p4-li-head">' +
          '<span class="p4-li-date">' + esc(a.date) + '</span>' +
          '<div class="p4-li-title">' + esc(a.title) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── API fetch ─────────────────────────────────────────────
  async function loadVideos() {
    try {
      var r1 = await fetch(
        'https://www.googleapis.com/youtube/v3/channels?key=' + API_KEY +
        '&forHandle=' + CHANNEL + '&part=contentDetails&maxResults=1'
      );
      var d1 = await r1.json();
      if (!d1.items || !d1.items[0]) throw new Error('no channel');
      var uploadsId = d1.items[0].contentDetails.relatedPlaylists.uploads;
      var r2 = await fetch(
        'https://www.googleapis.com/youtube/v3/playlistItems?key=' + API_KEY +
        '&playlistId=' + uploadsId + '&part=snippet&maxResults=50'
      );
      var d2 = await r2.json();
      _all = (d2.items || [])
        .map(function (item) { return { id: item.snippet.resourceId.videoId, title: item.snippet.title }; })
        .filter(function (v) { return v.id; });
    } catch (e) {
      console.warn('[P4] YouTube API:', e.message);
      _all = [];
    }
    _ready = true;
    renderGrid(newestPlusPick(6));
    var btn = document.getElementById('p4-shuffle-btn');
    if (btn) { btn.textContent = '🔀 隨機換一換'; btn.disabled = false; }
  }

  // ── Public API ────────────────────────────────────────────
  return {
    init: function () {
      renderPosts();
      renderStudy();
      loadVideos();
    },
    shuffle: function () {
      if (!_ready) return;
      renderGrid(newestPlusPick(6));
    },
    play: function (card) {
      var id = card.getAttribute('data-id');
      card.style.cursor = 'default';
      card.onclick = null;
      card.innerHTML =
        '<div class="p4-vc-player">' +
          '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0" frameborder="0" ' +
            'allowfullscreen allow="autoplay;encrypted-media;picture-in-picture"></iframe>' +
        '</div>' +
        '<a class="p4-vc-yt" href="https://www.youtube.com/watch?v=' + id + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ 在 YouTube 觀看</a>';
    },
    openPost: function (id) {
      if (window.openFBPostModal) openFBPostModal();
      if (window.showFBDetail) showFBDetail(id);
    },
    openStudy: function (id) {
      if (window.openSSModal) openSSModal();
      if (window.showSSDetail) showSSDetail(id);
    },
    openLinkedPost: function (postId) {
      if (window.openLinkedFBPost) openLinkedFBPost(postId);
    },
    sharePost: function (id) {
      var p = (FB_POSTS || []).find(function (x) { return x.id === id; });
      if (!p) return;
      var prev = p.text ? p.text.substring(0, 65).replace(/\n/g, ' ') + '…' : '';
      if (window.openSharePopup) openSharePopup(p.title, prev);
    },
    shareStudy: function (id) {
      var a = (SELFSTUDY_ARTICLES || []).find(function (x) { return x.id === id; });
      if (!a) return;
      var prev = '';
      if (a.vocabulary && a.vocabulary.length) {
        var v = a.vocabulary[0];
        prev = v.thai + '（' + v.phonetic + '）= ' + v.meaning;
      }
      if (window.openSharePopup) openSharePopup(a.title, prev);
    }
  };
})();

document.addEventListener('DOMContentLoaded', function () { P4.init(); });
</script>
